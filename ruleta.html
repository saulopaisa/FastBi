<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 75 Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
    <style>
        :root { --primary: #0f172a; --gold: #ffb703; --success: #10b981; --danger: #ef4444; }
        
        /* Tablero Ultra-Compacto para 75 números */
        .history-grid { 
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 2px; 
            padding: 10px; 
            background: #cbd5e1; 
            border-radius: 8px;
        }
        .celda-seguimiento { 
            background: #fff; border: 1px solid #94a3b8;
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 800; color: #1e293b;
        }
        .celda-seguimiento.cantada { background: var(--gold); color: #000; border-color: #b45309; }

        .timer-display { background: #000; color: #f00; font-family: monospace; font-size: 2.2rem; text-align: center; border: 2px solid #333; margin: 5px 0; }
        .btn-accion { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 5px; color: white; }
        .btn-accion:disabled { background: #475569 !important; opacity: 0.4; cursor: not-allowed; }
        
        /* Estilos Modales */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; color: white; border: 1px solid var(--gold); }
        .grid-seleccion-cartones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 8px; }
        .check-item { background: #334155; padding: 8px; border-radius: 5px; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="layout-container">
        <aside class="panel-izquierdo">
            <h1 class="main-title">BINGO 75</h1>
            
            <div id="onlineCount" style="text-align: center; color: var(--gold); font-size: 0.9rem; margin-bottom: 10px;">👥 ONLINE: 0</div>

            <div class="control-flujo-box">
                <div id="cronometroBingo" class="timer-display">00:00</div>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="minutosInicio" placeholder="Min" style="width: 60px; padding: 5px;">
                    <button id="btnProgramar" onclick="programarJuego()" class="btn-accion" disabled style="background: var(--gold); color: #000; flex: 1;">PROGRAMAR</button>
                </div>
                <button id="btnEmpezar" onclick="cambiarEstado('jugando', '¡PARTIDA INICIADA!')" class="btn-accion" disabled style="background: var(--success); margin-top: 5px;">EMPEZAR YA</button>
            </div>

            <div class="controls" style="margin-top: 15px;">
                <button id="btnAbrirCartones" onclick="abrirModalCartones()" class="btn-accion" disabled style="background: #6366f1;">2. SELECCIONAR CARTONES</button>
                
                <button id="drawBtn" class="btn-accion" disabled style="background: #3b82f6;">SORTEAR PRÓXIMO</button>

                <div class="verifier-area" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
                    <button id="btnVerificando" class="btn-accion" disabled style="background: #8b5cf6;" onclick="cambiarEstado('verificando', 'Verificando... ¡Pausen sus cartones!')">🔔 AVISAR: VERIFICANDO...</button>
                    
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="idABuscar" placeholder="ID #" style="flex: 1;">
                        <button onclick="revisarCartonManual()" style="background: var(--gold); border: none; padding: 5px; font-weight: bold;">BUSCAR</button>
                    </div>
                    <div id="areaVerificacion"></div>
                    
                    <div style="margin-top: 5px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        <button id="btnErrado" class="btn-accion" disabled onclick="cambiarEstado('jugando', 'BINGO ERRADO: CONTINUAMOS JUGANDO')" style="background: var(--danger); font-size: 0.7rem;">BINGO ERRADO</button>
                        <button id="btnValido" class="btn-accion" disabled onclick="anunciarGanador()" style="background: var(--success); font-size: 0.7rem;">BINGO VÁLIDO</button>
                    </div>
                </div>
                <button id="resetBtn" class="secondary" style="margin-top: 10px; width: 100%;">Reiniciar Todo</button>
            </div>
        </aside>

        <main class="panel-derecho">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px 15px;">
                <h3 style="margin:0">TABLERO DE SEGUIMIENTO</h3>
                <a href="generar.html" class="btn-gestion">+ GESTIONAR</a>
            </div>
            <div id="historyGrid" class="history-grid"></div>
        </main>
    </div>

    <button id="btnAbrirConfig" onclick="abrirModalPatron()" class="btn-config-flotante" style="position: fixed; bottom: 20px; left: 20px; background: #1e293b; color: white; padding: 12px; border: 2px solid var(--gold); border-radius: 50px; cursor: pointer; z-index: 1001; font-weight: bold;">⚙️ 1. CONFIGURAR PATRÓN</button>

    <div id="modalPatron" class="modal-overlay">
        <div class="modal-content">
            <h3 style="text-align: center;">DIBUJA EL PATRÓN</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                <button onclick="aplicarPredefinido('lleno')" style="background: #334155; color: white; border: 1px solid #444;">LLENO</button>
                <button onclick="aplicarPredefinido('equis')" style="background: #334155; color: white; border: 1px solid #444;">LA X</button>
                <button onclick="aplicarPredefinido('esquinas')" style="background: #334155; color: white; border: 1px solid #444;">4 ESQUINAS</button>
                <button onclick="aplicarPredefinido('limpiar')" style="background: #444; color: white; border: 1px solid #444;">BORRAR</button>
            </div>
            <div id="gridDibujoPatron" class="grid-patron-admin"></div>
            <button onclick="guardarPatron()" class="btn-accion" style="background: var(--success); margin-top: 15px;">GUARDAR PATRÓN</button>
        </div>
    </div>

    <div id="modalCartones" class="modal-overlay">
        <div class="modal-content">
            <h3 style="text-align: center;">CARTONES PARTICIPANTES</h3>
            <p style="font-size: 0.7rem; color: #94a3b8; text-align: center;">Desmarca los cartones que NO jugarán esta ronda</p>
            <div id="listaCheckCartones" class="grid-seleccion-cartones"></div>
            <button onclick="guardarSeleccionCartones()" class="btn-accion" style="background: var(--success); margin-top: 15px;">CONFIRMAR JUGADORES</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="ruleta.js"></script>
</body>
</html>
