<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
</head>
<body>
    <!-- PANEL IZQUIERDO -->
    <div class="sidebar">
        <div class="titulo">🎯 BINGO PRO</div>
        <div class="subtitulo">Panel de Control</div>
        
        <div id="onlineCount" class="online-count">👥 ONLINE: 0</div>

        <button id="btnEtapa1" onclick="window.abrirModalCartones()" class="btn-accion btn-etapa1">
            📋 1. SELECCIONAR JUGADORES
        </button>
        
        <button id="btnEtapa2" onclick="window.abrirModalPatron()" class="btn-accion btn-etapa2" disabled>
            🎯 2. CONFIGURAR PATRÓN
        </button>

        <div id="panelJuego" class="panel-juego" style="opacity: 0.4; pointer-events: none;">
            <div id="cronometroBingo" class="cronometro">00:00</div>
            
            <div class="input-group">
                <input type="number" id="minutosInicio" placeholder="Min">
                <button id="btnProgramar" onclick="window.programarJuego()" class="btn-programar" style="flex:1;">
                    ⏰ PROGRAMAR
                </button>
            </div>
            
            <button id="btnAutoBingo" onclick="window.iniciarBingoAutomatico()" class="btn-accion" disabled 
                style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">
                    🤖 BINGO AUTOMÁTICO
            </button>
            
            <button id="drawBtn" class="btn-accion btn-sortear">
                🎲 SORTEAR BOLA
            </button>
        </div>

        <!-- VERIFICADOR DE CARTÓN -->
        <div class="verifier-area">
            <div class="verifier-title">🔍 VERIFICAR CARTÓN</div>
            <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                <input type="text" id="idABuscar" placeholder="ID o # Cartón" style="flex:1;">
                <button onclick="window.revisarCartonManual()" class="btn-programar" style="padding: 8px 15px;">
                    BUSCAR
                </button>
            </div>
            
            <!-- Minicartón verificador -->
            <div id="minicartonVerificador" class="minicarton-container">
                <p style="color:#64748b; text-align:center; font-size:0.8rem;">Busca un cartón para verificar</p>
            </div>
            
            <div class="btn-group">
                <button onclick="window.bingoErrado()" class="btn-bingo-errado">
                    ❌ BINGO ERRADO
                </button>
                <button onclick="window.bingoValido()" class="btn-bingo-valido">
                    ✅ BINGO VÁLIDO
                </button>
            </div>
        </div>
        
        <button id="resetBtn" class="btn-reiniciar">
            🔄 Reiniciar Todo
        </button>
    </div>

    <!-- PANEL DERECHO -->
    <div class="main-content">
        <h3>📊 TABLERO DE SEGUIMIENTO (1-75)</h3>
        
        <!-- ALERTA DE BINGO - aparece cuando hay bingo -->
        <div id="alertaBingo" class="alerta-bingo" style="display:none;">
            <div class="alerta-bingo-contenido">
                <span class="alerta-icono">🚨</span>
                <div class="alerta-texto">
                    <div class="alerta-titulo">¡BINGO CANTADO!</div>
                    <div class="alerta-jugador" id="alertaJugador">-</div>
                    <div class="alerta-carton" id="alertaCarton">-</div>
                </div>
                <div class="alerta-acciones">
                    <button onclick="window.bingoValido()" class="alerta-btn-valido">✅ VÁLIDO</button>
                    <button onclick="window.bingoErrado()" class="alerta-btn-errado">❌ ERRADO</button>
                    <button onclick="window.cerrarAlerta()" class="alerta-btn-cerrar">✕</button>
                </div>
            </div>
        </div>
        
        <!-- Indicador de última bola -->
        <div class="ultima-bola-container">
            <div class="ultima-bola" id="ultimaBola">
                <span class="letra">-</span>
                <span class="numero">--</span>
            </div>
        </div>
        
        <!-- Últimos 5 cantados -->
        <div class="ultimos-container" id="ultimosCantados">
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
        </div>
        
        <!-- Tablero completo -->
        <div id="historyGrid" class="history-grid"></div>
    </div>

   <!-- MODAL CARTONES -->
<div id="modalCartones" class="modal-overlay">
    <div class="modal-content">
        <h3>📋 PASO 1: ¿QUIÉN JUEGA?</h3>
        
        <!-- Buscador -->
        <div style="margin-bottom:10px;">
            <input type="text" placeholder="🔍 Buscar jugador..." 
                oninput="window.buscarJugadorModal(this.value)"
                style="width:100%;padding:8px;border-radius:6px;border:2px solid #2d3748;background:#1e293b;color:white;">
        </div>
        
        <!-- Botón Seleccionar Todos -->
        <button onclick="window.seleccionarTodosJugadores()" 
            style="width:100%;padding:8px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-bottom:10px;">
            ✅ SELECCIONAR TODOS
        </button>
        
        <div id="listaCheckCartones" class="grid-seleccion-cartones"></div>
        
        <button onclick="window.confirmarJugadores()" class="btn-accion btn-empezar">
            ✅ CONFIRMAR Y PASAR AL PATRÓN
        </button>
    </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

        var db = firebase.database();
    </script>
    <script src="ruleta.js"></script>
</body>
</html>
