<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
</head>
<body>
    <!-- PANEL IZQUIERDO -->
    <div class="sidebar">
        <div class="titulo">🎯 BINGO PRO</div>
        <div class="subtitulo">Panel de Control</div>
        
        <div id="onlineCount" class="online-count">👥 ONLINE: 0</div>

        <button id="btnEtapa1" onclick="window.abrirModalCartones()" class="btn-accion btn-etapa1">
            📋 1. SELECCIONAR JUGADORES
        </button>
        
        <button id="btnEtapa2" onclick="window.abrirModalPatron()" class="btn-accion btn-etapa2" disabled>
            🎯 2. CONFIGURAR PATRÓN
        </button>

        <div id="panelJuego" class="panel-juego" style="opacity: 0.4; pointer-events: none;">
            <div id="cronometroBingo" class="cronometro">00:00</div>
            
            <div class="input-group">
                <input type="number" id="minutosInicio" placeholder="Min">
                <button id="btnProgramar" onclick="window.programarJuego()" class="btn-programar" style="flex:1;">
                    ⏰ PROGRAMAR
                </button>
            </div>
            
            <button id="btnEmpezar" onclick="window.cambiarEstado('jugando', '¡QUE COMIENCE EL BINGO!')" class="btn-accion btn-empezar">
                ▶️ EMPEZAR AHORA
            </button>
            
            <button id="drawBtn" class="btn-accion btn-sortear">
                🎲 SORTEAR BOLA
            </button>
        </div>

        <div class="verifier-area">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="idABuscar" placeholder="🔍 ID Cartón">
                <button onclick="window.revisarCartonManual()" class="btn-programar" style="padding: 8px 15px;">
                    REVISAR
                </button>
            </div>
            
            <div class="btn-group">
                <button onclick="window.cambiarEstado('jugando', 'BINGO ERRADO')" class="btn-bingo-errado">
                    ❌ BINGO ERRADO
                </button>
                <button onclick="window.anunciarGanador()" class="btn-bingo-valido">
                    ✅ BINGO VÁLIDO
                </button>
            </div>
        </div>
        
        <button id="resetBtn" class="btn-reiniciar">
            🔄 Reiniciar Todo
        </button>
    </div>

    <!-- PANEL DERECHO -->
    <div class="main-content">
        <h3>📊 TABLERO DE SEGUIMIENTO (1-75)</h3>
        
        <!-- Indicador de última bola -->
        <div class="ultima-bola-container">
            <div class="ultima-bola" id="ultimaBola">
                <span class="letra">-</span>
                <span class="numero">--</span>
            </div>
        </div>
        
        <!-- Últimos 5 cantados -->
        <div class="ultimos-container" id="ultimosCantados">
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
            <div class="ultimo-item vacio"><div class="letra-peq">-</div><div class="num-peq">--</div></div>
        </div>
        
        <!-- Tablero completo sin scroll -->
        <div id="historyGrid" class="history-grid"></div>
    </div>

    <!-- MODAL CARTONES -->
    <div id="modalCartones" class="modal-overlay">
        <div class="modal-content">
            <h3>📋 PASO 1: ¿QUIÉN JUEGA?</h3>
            <div id="listaCheckCartones" class="grid-seleccion-cartones"></div>
            <button onclick="window.confirmarJugadores()" class="btn-accion btn-empezar">
                ✅ CONFIRMAR Y PASAR AL PATRÓN
            </button>
        </div>
    </div>

    <!-- MODAL PATRÓN -->
    <div id="modalPatron" class="modal-overlay">
        <div class="modal-content">
            <h3>🎯 PASO 2: ELIGE EL PATRÓN</h3>
            <div class="grid-predefinidos">
                <button onclick="window.aplicarPredefinido('lleno')" class="btn-predefinido">⬛ LLENO</button>
                <button onclick="window.aplicarPredefinido('equis')" class="btn-predefinido">❌ LA X</button>
                <button onclick="window.aplicarPredefinido('limpiar')" class="btn-predefinido">🔄 BORRAR</button>
            </div>
            <div id="gridDibujoPatron" class="grid-patron-admin"></div>
            <button onclick="window.confirmarPatron()" class="btn-accion btn-empezar" style="margin-top: 15px;">
                ✅ CONFIRMAR Y ACTIVAR JUEGO
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
    </script>
    <script src="ruleta.js"></script>
</body>
</html>
