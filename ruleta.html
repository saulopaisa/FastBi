<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 75 Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
    <style>
        /* Estilos para las nuevas funciones de control */
        .control-flujo-box {
            background: rgba(30, 58, 138, 0.5);
            border: 1px solid var(--accent-gold);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-esperando { background: #f59e0b; color: #fff; }
        .status-jugando { background: #10b981; color: #fff; }
        .status-verificando { background: #3b82f6; color: #fff; }

        .btn-anuncio {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px;
            font-size: 0.7rem;
            border-radius: 4px;
            width: 100%;
            margin-top: 5px;
            font-weight: bold;
        }

        .alert-bingo-card {
            background: #ef4444;
            color: white;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .radar-header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        #contadorCartonesReal {
            background: var(--accent-gold);
            color: var(--primary-blue);
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 0.7rem;
            box-shadow: 0 0 10px rgba(255, 183, 3, 0.2);
            transition: all 0.3s ease;
        }

        .no-arrows::-webkit-inner-spin-button, 
        .no-arrows::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <aside class="panel-izquierdo">
            <h1 class="main-title">BINGO 75</h1>
            
            <div class="control-flujo-box">
                <div id="badgeEstado" class="status-badge status-esperando">Estado: Esperando</div>
                
                <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 10px;">
                    <input type="number" id="minutosInicio" class="no-arrows" placeholder="Min" style="width: 50px; padding: 5px; border-radius: 4px;">
                    <button onclick="iniciarCuentaRegresiva()" style="font-size: 0.6rem; padding: 6px; background: var(--accent-gold); color: black; border: none; font-weight: bold; border-radius: 4px; flex: 1;">PROGRAMAR INICIO</button>
                </div>

                <button onclick="cambiarEstado('jugando', '¡EL JUEGO HA COMENZADO!')" style="width: 100%; background: #10b981; color: white; border: none; padding: 8px; border-radius: 4px; font-weight: bold; margin-bottom: 5px;">EMPEZAR AHORA</button>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button class="btn-anuncio" onclick="anunciarVerificacion()">VERIFICANDO...</button>
                    <button class="btn-anuncio" style="background: #f59e0b;" onclick="anunciarGanador()">HAY GANADOR!</button>
                </div>
            </div>

            <div class="bolo-display">
                <div id="currentLetter">-</div>
                <div id="currentNumber">--</div>
            </div>

            <div class="recent-box">
                <small>ÚLTIMOS 5:</small>
                <div id="recentList" class="recent-list"></div>
            </div>

            <div class="controls">
                <button id="drawBtn" disabled>SORTEAR PRÓXIMO</button>
                <div class="stats">TOTAL CANTADOS: <b id="count">0</b>/75</div>
                
                <div id="radarGanadores" class="radar-box">
                    <div class="radar-header-box">
                        <small>ALERTAS DE BINGO (EN VIVO):</small>
                        <div id="contadorCartonesReal">JUGANDO: 0</div>
                    </div>
                    <div id="listaAlertasBingo">
                        </div>
                    <div id="textoGanadores" class="texto-ganadores">
                        Monitoreando señales...
                    </div>
                </div>

                <button id="resetBtn" class="secondary" style="margin-top: 10px;">Reiniciar Todo</button>

                <div class="admin-verifier-box">
                    <p id="labelPatron" class="verifier-label">MODO: MANUAL</p>
                    <div class="search-group">
                        <input type="number" id="idABuscar" class="no-arrows" placeholder="ID #">
                        <button id="btnVerificar" class="btn-check">REVISAR</button>
                    </div>
                </div>
            </div>

            <div id="areaVerificacion" class="mini-carton-container"></div>
        </aside>

        <main class="panel-derecho">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">TABLERO DE SEGUIMIENTO GENERAL</h3>
                <a href="generar.html" style="color: var(--accent-gold); font-weight: bold; text-decoration: none; font-size: 0.8rem; border: 1px solid var(--accent-gold); padding: 5px 10px; border-radius: 5px;">+ GESTIONAR CARTONES</a>
            </div>
            <div id="historyGrid" class="history-grid"></div>
        </main>
    </div>

    <button id="btnAbrirConfig" class="btn-config-flotante">⚙️ Cambiar Patrón</button>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. ESCUCHAR ALERTAS DE BINGO (Jugadores)
        db.ref('notificaciones/bingo').on('value', (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('listaAlertasBingo');
            const textoStatus = document.getElementById('textoGanadores');
            
            if (data) {
                textoStatus.style.display = 'none';
                contenedor.innerHTML = `
                    <div class="alert-bingo-card">
                        <span>🚨 CARTÓN <b>#${data.id}</b> CANTO BINGO!</span>
                        <button onclick="revisarGanador(${data.id})" style="background:white; border:none; padding:2px 5px; border-radius:3px; cursor:pointer; font-weight:bold;">VER</button>
                    </div>
                `;
                // Sonido de alerta opcional
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                audio.play();
            } else {
                contenedor.innerHTML = '';
                textoStatus.style.display = 'block';
            }
        });

        // 2. FUNCIONES DE CONTROL DE ESTADO
        function cambiarEstado(nuevoStatus, mensaje) {
            db.ref('partidaActual').update({
                status: nuevoStatus,
                anuncio: mensaje
            });
            actualizarBadgeUI(nuevoStatus);
        }

        function iniciarCuentaRegresiva() {
            const min = document.getElementById('minutosInicio').value || 1;
            const target = Date.now() + (min * 60000);
            
            db.ref('partidaActual').update({
                status: 'esperando',
                proximoJuego: target,
                anuncio: `EL JUEGO INICIA EN ${min} MINUTOS`
            });
            actualizarBadgeUI('esperando');
            alert(`Cronómetro activado para ${min} minutos`);
        }

        function anunciarVerificacion() {
            cambiarEstado('verificando', '⚠️ UN MOMENTO... ESTAMOS VERIFICANDO UN CARTÓN');
        }

        function anunciarGanador() {
            const id = prompt("Ingrese el ID del cartón ganador:");
            if (id) {
                cambiarEstado('finalizado', `🏆 ¡FELICIDADES! EL CARTÓN #${id} ES EL GANADOR 🏆`);
            }
        }

        function actualizarBadgeUI(status) {
            const b = document.getElementById('badgeEstado');
            b.innerText = `Estado: ${status}`;
            b.className = `status-badge status-${status}`;
        }

        function revisarGanador(id) {
            document.getElementById('idABuscar').value = id;
            document.getElementById('btnVerificar').click(); // Dispara la búsqueda en ruleta.js
        }

        // Función original mantenida
        function mandarNumeroAlJuego(numero) {
            if(!numero) return;
            let letra = (numero <= 15) ? 'B' : (numero <= 30) ? 'I' : (numero <= 45) ? 'N' : (numero <= 60) ? 'G' : 'O';
            
            db.ref('partidaActual').update({
                numero: numero,
                letra: letra,
                status: 'jugando', // Asegura que el estado sea jugando al cantar bola
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }
    </script>

    <script src="ruleta.js"></script>

</body>
</html>
