<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 75 Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
    <style>
        :root { --primary-blue: #0f172a; --accent-gold: #ffb703; }
        
        /* Estilos de los estados del juego */
        .control-flujo-box { 
            background: rgba(30, 58, 138, 0.5); 
            border: 1px solid var(--accent-gold); 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
        }
        .status-badge { 
            display: inline-block; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
        }
        .status-esperando { background: #f59e0b; color: #fff; }
        .status-jugando { background: #10b981; color: #fff; }
        .status-verificando { background: #3b82f6; color: #fff; }
        
        .btn-anuncio { 
            background: #6366f1; 
            color: white; 
            border: none; 
            padding: 8px; 
            font-size: 0.7rem; 
            border-radius: 4px; 
            width: 100%; 
            margin-top: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* Alerta de Bingo (Radar) */
        .alert-bingo-card { 
            background: #ef4444; 
            color: white; 
            padding: 10px; 
            border-radius: 5px; 
            margin-top: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            animation: pulse-red 1.5s infinite;
            border: 2px solid white;
        }
        @keyframes pulse-red { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 
            100% { transform: scale(1); } 
        }

        /* Modal y Patrones */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
        }
        .grid-patron-admin { 
            display: grid; 
            grid-template-columns: repeat(5, 40px); 
            gap: 5px; 
            justify-content: center; 
            margin: 15px 0; 
        }
        .celda-patron-admin { 
            width: 40px; height: 40px; 
            background: #334155; 
            border-radius: 4px; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 1.2rem; 
        }
        .celda-patron-admin.activa { background: var(--accent-gold); color: #000; }
        
        .btn-predefinido {
            background: #475569;
            color: white;
            border: 1px solid #64748b;
            padding: 5px;
            font-size: 0.65rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-predefinido:hover { background: var(--accent-gold); color: black; }
    </style>
</head>
<body>
    <div class="layout-container">
        <aside class="panel-izquierdo">
            <h1 class="main-title">BINGO 75</h1>
            
            <div class="control-flujo-box">
                <div id="badgeEstado" class="status-badge status-esperando">Estado: Esperando</div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="number" id="minutosInicio" placeholder="Min" style="width: 55px; padding: 6px; border-radius: 4px; border: none;">
                    <button onclick="iniciarCuentaRegresiva()" style="background: var(--accent-gold); border: none; padding: 6px; font-weight: bold; flex: 1; border-radius: 4px; cursor: pointer;">PROGRAMAR</button>
                </div>
                <button onclick="cambiarEstado('jugando', '¡EL JUEGO HA COMENZADO!')" style="width: 100%; background: #10b981; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 8px;">EMPEZAR AHORA</button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button class="btn-anuncio" onclick="anunciarVerificacion()">VERIFICANDO...</button>
                    <button class="btn-anuncio" style="background: #f59e0b;" onclick="anunciarGanador()">HAY GANADOR!</button>
                </div>
            </div>

            <div class="bolo-display">
                <div id="currentLetter">-</div>
                <div id="currentNumber">--</div>
            </div>

            <div class="recent-box">
                <small>ÚLTIMOS 5:</small>
                <div id="recentList" class="recent-list"></div>
            </div>

            <div class="controls">
                <button id="drawBtn" style="height: 60px; font-size: 1.2rem;">SORTEAR PRÓXIMO</button>
                <div class="stats">TOTAL CANTADOS: <b id="count">0</b>/75</div>
                
                <div id="radarGanadores" class="radar-box" style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent-gold);">
                    <small style="color: var(--accent-gold); font-weight: bold;">AVISOS DE JUGADORES:</small>
                    <div id="listaAlertasBingo"></div>
                    <div id="textoGanadores" class="texto-ganadores" style="font-size: 0.7rem; margin-top: 5px; opacity: 0.6;">Esperando señal de bingo...</div>
                </div>

                <button id="resetBtn" class="secondary" style="margin-top: 15px; opacity: 0.7;">Reiniciar Partida</button>

                <div class="admin-verifier-box" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
                    <p class="verifier-label" style="font-size: 0.75rem; margin-bottom: 5px;">VERIFICAR CARTÓN POR ID:</p>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="idABuscar" placeholder="ID #" style="flex: 1; padding: 8px; border-radius: 4px; border: none; background: #334155; color: white;">
                        <button id="btnVerificar" onclick="revisarCartonManual()" style="background: var(--accent-gold); border: none; padding: 8px 12px; font-weight: bold; cursor: pointer; border-radius: 4px;">REVISAR</button>
                    </div>
                </div>
            </div>

            <div id="areaVerificacion" class="mini-carton-container" style="margin-top: 15px;"></div>
        </aside>

        <main class="panel-derecho">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">TABLERO DE SEGUIMIENTO GENERAL</h3>
                <a href="generar.html" style="background: #334155; color: var(--accent-gold); text-decoration: none; padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; border: 1px solid var(--accent-gold); font-weight: bold;">+ GESTIONAR CARTONES</a>
            </div>
            <div id="historyGrid" class="history-grid"></div>
        </main>
    </div>

    <button id="btnAbrirConfig" class="btn-config-flotante">⚙️ Configurar Patrón</button>

    <div id="modalConfig" class="modal-overlay">
        <div class="modal-content" style="background:#1e293b; padding:25px; border-radius:15px; border: 2px solid var(--accent-gold); width: 90%; max-width: 380px;">
            <h2 style="color:var(--accent-gold); text-align: center; margin-bottom: 15px;">PATRÓN DE JUEGO</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                <button class="btn-predefinido" onclick="aplicarPredefinido('lleno')">Cartón Lleno</button>
                <button class="btn-predefinido" onclick="aplicarPredefinido('lineaH')">Línea Horiz.</button>
                <button class="btn-predefinido" onclick="aplicarPredefinido('equis')">La "X"</button>
                <button class="btn-predefinido" onclick="aplicarPredefinido('limpiar')" style="background: #1e1e1e; border-color: #444;">Limpiar Todo</button>
            </div>

            <div id="gridDibujoPatron" class="grid-patron-admin"></div>
            
            <p style="font-size: 0.65rem; color: #94a3b8; text-align: center; margin-bottom: 15px;">Haz clic en las casillas para personalizar el patrón manualmente.</p>

            <div style="display:flex; gap:10px;">
                <button onclick="guardarPatron()" style="flex:1; background:#10b981; color:white; padding:12px; border: none; border-radius:8px; font-weight: bold; cursor: pointer;">GUARDAR CAMBIOS</button>
                <button onclick="document.getElementById('modalConfig').style.display='none'" style="flex:1; background:#ef4444; color:white; padding:12px; border: none; border-radius:8px; font-weight: bold; cursor: pointer;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="ruleta.js"></script>
</body>
</html>
