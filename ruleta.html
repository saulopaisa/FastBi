<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 75 Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
    <style>
        :root { --primary-blue: #0f172a; --accent-gold: #ffb703; }
        .timer-display { background: #000; color: #ff0000; font-family: monospace; font-size: 2rem; text-align: center; padding: 10px; border-radius: 8px; margin: 10px 0; border: 2px solid #333; }
        .mini-carton-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #334155; padding: 8px; border-radius: 6px; margin-top: 10px; border: 1px solid var(--accent-gold); }
        .mini-celda { background: #fff; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: #000; border-radius: 3px; }
        .mini-celda.marcada { background: var(--accent-gold); color: #000; box-shadow: inset 0 0 5px rgba(0,0,0,0.4); }
        .mini-celda.estrella { background: #0f172a; color: #fff; }
        .btn-accion { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 5px; color: white; }
    </style>
</head>
<body>
    <div class="layout-container">
        <aside class="panel-izquierdo">
            <h1 class="main-title">BINGO 75</h1>
            
            <div class="control-flujo-box">
                <div id="badgeEstado" class="status-badge status-esperando">Estado: Esperando</div>
                <div id="cronometroBingo" class="timer-display">00:00</div>
                
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="number" id="minutosInicio" placeholder="Min" style="width: 60px; border-radius: 4px; border: none; padding: 5px;">
                    <button onclick="programarJuego()" style="background: var(--accent-gold); flex: 1; font-weight: bold; border-radius: 4px; border: none; cursor: pointer;">PROGRAMAR</button>
                </div>
                <button onclick="cambiarEstado('jugando', '¡JUEGO INICIADO!')" class="btn-accion" style="background: #10b981;">EMPEZAR AHORA</button>
            </div>

            <div class="bolo-display">
                <div id="currentLetter">-</div>
                <div id="currentNumber">--</div>
            </div>

            <div class="recent-box">
                <small>ÚLTIMOS 5:</small>
                <div id="recentList" class="recent-list"></div>
            </div>

            <div class="controls">
                <button id="drawBtn">SORTEAR PRÓXIMO</button>
                <div class="stats">TOTAL CANTADOS: <b id="count">0</b>/75</div>
                
                <div id="radarGanadores" class="radar-box">
                    <div id="listaAlertasBingo"></div>
                    <div id="textoGanadores">Esperando señales...</div>
                </div>

                <div class="verifier-area" style="margin-top: 20px; border-top: 1px solid #444; padding-top: 15px;">
                    <small style="color: var(--accent-gold)">VERIFICADOR VISUAL:</small>
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <input type="number" id="idABuscar" placeholder="ID #" style="flex: 1; padding: 8px;">
                        <button onclick="revisarCartonManual()" style="background: var(--accent-gold); border: none; padding: 0 15px; font-weight: bold;">BUSCAR</button>
                    </div>
                    
                    <div id="areaVerificacion"></div>

                    <div id="botonesPostVerificacion" style="margin-top: 10px;">
                        <button class="btn-accion" style="background: #6366f1;" onclick="cambiarEstado('jugando', 'BINGO ERRADO - CONTINUAMOS')">BINGO ERRADO: SEGUIR</button>
                        <button class="btn-accion" style="background: #f59e0b;" onclick="anunciarGanador()">BINGO VÁLIDO: GANADOR</button>
                    </div>
                </div>

                <button id="resetBtn" class="secondary" style="margin-top: 20px;">Reiniciar Todo</button>
            </div>
        </aside>

        <main class="panel-derecho">
            <h3 style="text-align: center; color: var(--primary-blue);">TABLERO DE SEGUIMIENTO GENERAL</h3>
            <div id="historyGrid" class="history-grid"></div>
        </main>
    </div>

    <button id="btnAbrirConfig" class="btn-config-flotante">⚙️ Configurar Patrón</button>

    <div id="modalConfig" class="modal-overlay">
        <div class="modal-content" style="background:#1e293b; padding:20px; border-radius:12px; color: white; width: 320px;">
            <h3 style="text-align:center">PATRÓN DE VICTORIA</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                <button onclick="aplicarPredefinido('lleno')">LLENO</button>
                <button onclick="aplicarPredefinido('equis')">LA X</button>
            </div>
            <div id="gridDibujoPatron" class="grid-patron-admin"></div>
            <button onclick="guardarPatron()" class="btn-accion" style="background: #10b981; margin-top: 10px;">GUARDAR PATRÓN</button>
            <button onclick="document.getElementById('modalConfig').style.display='none'" class="btn-accion" style="background: #444;">CERRAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="ruleta.js"></script>
</body>
</html>
