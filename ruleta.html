<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 75 Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
    <style>
        :root { --primary: #0f172a; --gold: #ffb703; --success: #10b981; }
        
        /* Tablero Ajustado para 75 números en pantalla */
        .history-grid { 
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 2px; 
            padding: 10px; 
            background: #f1f5f9; 
            border-radius: 8px;
            max-height: 70vh;
        }
        .celda-seguimiento { 
            background: #fff; border: 1px solid #cbd5e1;
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: bold; color: #334155;
        }
        .celda-seguimiento.cantada { background: var(--gold); color: #000; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }

        /* Lista de cartones activos */
        .card-selector-box { background: #1e293b; padding: 10px; border-radius: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .card-item { display: flex; justify-content: space-between; color: white; font-size: 0.8rem; padding: 4px; border-bottom: 1px solid #334155; }
        
        .timer-display { background: #000; color: #f00; font-family: monospace; font-size: 2rem; text-align: center; border: 2px solid #333; margin: 5px 0; }
        .btn-accion:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="layout-container">
        <aside class="panel-izquierdo">
            <h1 class="main-title">BINGO 75</h1>
            
            <div id="onlineCount" style="text-align: center; color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 10px;">
                👥 JUGADORES ONLINE: 0
            </div>

            <div class="control-flujo-box">
                <div id="cronometroBingo" class="timer-display">00:00</div>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="minutosInicio" placeholder="Min" style="width: 60px;">
                    <button id="btnProgramar" onclick="programarJuego()" class="btn-accion" disabled style="background: var(--gold); flex: 1; color: #000;">PROGRAMAR</button>
                </div>
                <button id="btnEmpezar" onclick="cambiarEstado('jugando', '¡JUEGO INICIADO!')" class="btn-accion" disabled style="background: var(--success); margin-top: 5px;">EMPEZAR YA</button>
            </div>

            <div class="card-selector-box">
                <small style="color: var(--gold)">¿QUIÉNES JUEGAN ESTA RONDA?</small>
                <div id="listaParticipantes"></div>
            </div>

            <div class="controls">
                <button id="drawBtn" class="btn-accion" disabled style="background: #3b82f6;">SORTEAR PRÓXIMO</button>
                
                <div id="radarGanadores" class="radar-box">
                    <div id="listaAlertasBingo"></div>
                </div>

                <div class="verifier-area" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
                    <button id="btnVerificando" class="btn-accion" disabled style="background: #6366f1;" onclick="cambiarEstado('verificando', 'Verificando cartón... ¡Pausa!')">🔔 AVISAR: VERIFICANDO...</button>
                    
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <input type="number" id="idABuscar" placeholder="ID #" style="flex: 1;">
                        <button onclick="revisarCartonManual()" style="background: var(--gold); border: none; padding: 5px;">BUSCAR</button>
                    </div>
                    <div id="areaVerificacion"></div>
                    
                    <div style="margin-top: 5px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        <button onclick="cambiarEstado('jugando', 'BINGO ERRADO - SEGUIMOS JUGANDO')" style="background: #ef4444; color: white; border: none; padding: 8px; border-radius: 4px;">BINGO ERRADO</button>
                        <button onclick="anunciarGanador()" style="background: var(--gold); font-weight: bold; border: none;">BINGO VÁLIDO</button>
                    </div>
                </div>

                <button id="resetBtn" class="secondary" style="margin-top: 15px;">Reiniciar Todo</button>
            </div>
        </aside>

        <main class="panel-derecho">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
                <h3>TABLERO DE SEGUIMIENTO</h3>
                <a href="generar.html" style="background: var(--primary); color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 0.8rem;">GESTIONAR CARTONES</a>
            </div>
            <div id="historyGrid" class="history-grid"></div>
        </main>
    </div>

    <button id="btnAbrirConfig" class="btn-config-flotante" style="position: fixed; bottom: 20px; left: 20px; background: #1e293b; color: white; padding: 10px; border: 2px solid var(--gold); border-radius: 50px; cursor: pointer; z-index: 100;">⚙️ 1. CONFIGURAR PATRÓN</button>

    <div id="modalConfig" class="modal-overlay">
        <div class="modal-content" style="background:#1e293b; padding:20px; border-radius:12px; color: white; width: 280px;">
            <h3 style="text-align:center">DIBUJA EL PATRÓN</h3>
            <div id="gridDibujoPatron" class="grid-patron-admin"></div>
            <button onclick="guardarPatron()" class="btn-accion" style="background: var(--success); margin-top: 15px;">GUARDAR Y DESBLOQUEAR JUEGO</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="ruleta.js"></script>
</body>
</html>
