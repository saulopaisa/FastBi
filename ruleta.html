<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 75 Pro - Panel de Control</title>
    <link rel="stylesheet" href="ruleta.css">
    <style>
        :root { --primary-blue: #0f172a; --accent-gold: #ffb703; }
        .timer-display { background: #000; color: #ff0000; font-family: 'Courier New', monospace; font-size: 1.5rem; text-align: center; padding: 5px; border-radius: 4px; margin-top: 5px; border: 1px solid #333; }
        .mini-carton-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #334155; padding: 5px; border-radius: 4px; margin-top: 10px; }
        .mini-celda { background: #fff; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: #000; border-radius: 2px; }
        .mini-celda.marcada { background: #ffb703; color: #000; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .mini-celda.estrella { background: #0f172a; color: #fff; }
        .btn-seguir { background: #6366f1; color: white; width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="layout-container">
        <aside class="panel-izquierdo">
            <h1 class="main-title">BINGO 75</h1>
            
            <div class="control-flujo-box">
                <div id="badgeEstado" class="status-badge status-esperando">Estado: Esperando</div>
                <div id="cronometroBingo" class="timer-display">00:00</div>
                
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <input type="number" id="minutosInicio" placeholder="Min" style="width: 50px;">
                    <button onclick="programarJuego()" style="background: var(--accent-gold); flex: 1; font-weight: bold;">PROGRAMAR</button>
                </div>
                
                <button onclick="cambiarEstado('jugando', '¡JUEGO INICIADO!')" style="width: 100%; background: #10b981; color: white; margin-top: 10px; padding: 10px; font-weight: bold;">EMPEZAR AHORA</button>
            </div>

            <div class="bolo-display">
                <div id="currentLetter">-</div>
                <div id="currentNumber">--</div>
            </div>

            <div class="controls">
                <button id="drawBtn">SORTEAR PRÓXIMO</button>
                <div id="radarGanadores" class="radar-box">
                    <div id="listaAlertasBingo"></div>
                    <div id="textoGanadores">Monitoreando...</div>
                </div>

                <div class="verifier-area">
                    <small>VERIFICADOR VISUAL:</small>
                    <div style="display: flex; gap: 2px;">
                        <input type="number" id="idABuscar" placeholder="ID #" style="flex: 1;">
                        <button onclick="revisarCartonManual()">BUSCAR</button>
                    </div>
                    <div id="areaVerificacion"></div>
                    <button class="btn-seguir" onclick="cambiarEstado('jugando', 'BINGO ERRADO - CONTINUAMOS')">BINGO ERRADO: SEGUIR</button>
                    <button class="btn-anuncio" style="background:#f59e0b" onclick="anunciarGanador()">BINGO VÁLIDO: GANADOR</button>
                </div>
            </div>
        </aside>

        <main class="panel-derecho">
            <div id="historyGrid" class="history-grid"></div>
        </main>
    </div>

    <div id="modalConfig" class="modal-overlay">
        <div class="modal-content" style="background:#1e293b; padding:20px; border-radius:10px;">
            <div id="gridDibujoPatron" class="grid-patron-admin"></div>
            <button onclick="guardarPatron()" style="width: 100%; background:#10b981; color:white;">GUARDAR PATRÓN</button>
            <button onclick="document.getElementById('modalConfig').style.display='none'">CERRAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="ruleta.js"></script>
</body>
</html>
