<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador de Cartones</title>
    <link rel="stylesheet" href="generar.css">
</head>
<body>
    <!-- ============ SIDEBAR IZQUIERDO ============ -->
    <div class="sidebar">
        <div class="titulo">🎯 BINGO PRO</div>
        <div class="subtitulo">Generador de Cartones</div>
        
        <!-- Contador de cartones -->
        <div id="contadorRegistrados" class="btn-contador">
            🎫 CARTONES: 0
        </div>

        <!-- Generar lote de cartones -->
        <div class="input-lote-group">
            <input type="number" id="cantidadGenerar" placeholder="Cantidad" min="1" max="100" value="1">
            <button class="btn-generar" onclick="window.generarLote()">
                ⚡ GENERAR
            </button>
        </div>

        <!-- Herramientas -->
        <div class="grid-tools">
            <button class="btn-tool" onclick="window.exportarJSON()" title="Guardar todos los cartones">
                💾 Guardar
            </button>
            <button class="btn-tool" onclick="document.getElementById('fileIn').click()" title="Cargar cartones guardados">
                📂 Abrir
            </button>
            <button class="btn-tool pdf" onclick="window.exportarPDF()" title="Exportar seleccionados a PDF">
                📄 PDF
            </button>
            <button class="btn-tool links" onclick="window.verTodos()" title="Ver links de cartones">
                🔗 Links
            </button>
            <button class="btn-tool" onclick="window.seleccionarTodos()" title="Seleccionar todos">
                ✅ Sel. Todos
            </button>
            <button class="btn-tool danger" onclick="window.borrarTodo()" title="Eliminar todos los cartones">
                🗑️ Borrar
            </button>
        </div>
        
        <!-- Input file oculto para importar -->
        <input type="file" id="fileIn" style="display:none" accept=".json" onchange="window.importarJSON(event)">

        <!-- Buscador -->
        <div class="buscador">
            <input type="text" id="buscadorCartones" placeholder="🔍 Buscar por nombre o ID..." oninput="window.filtrarCartones(this.value)">
        </div>

        <!-- Lista de cartones -->
        <div class="lista-container" id="listaCartones">
            <p style="color:#94a3b8; text-align:center; padding:20px;">
                No hay cartones generados aún
            </p>
        </div>

        <!-- Botón para ir al juego -->
        <button class="btn-ir-juego" onclick="location.href='ruleta.html'">
            🎮 IR AL JUEGO →
        </button>
    </div>

    <!-- ============ CONTENIDO PRINCIPAL ============ -->
    <div class="main-content">
        <div id="vista-previa-contenido" class="preview-box">
            <div class="preview-empty">
                <h2>👁️ VISTA PREVIA</h2>
                <p>Selecciona un cartón para verlo en detalle</p>
                <p style="font-size:0.8rem; margin-top:20px;">
                    💡 Tip: Puedes renombrar cartones y asignarlos después
                </p>
            </div>
        </div>
    </div>

    <!-- ============ SCRIPTS ============ -->
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <!-- Configuración y lógica -->
    <script src="firebase-config.js"></script>
    <script src="generar.js"></script>
    <script src="ui-helpers.js"></script>
</body>
</html>
