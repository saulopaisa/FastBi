<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",

            appId: "1:473863283329:web:2c4bf96de167d105fa6380"

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a202c; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; }
        .main-container { display: flex; max-width: 1100px; width: 100%; background: #2d3748; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* Panel Izquierdo */
        .panel-izquierdo { width: 450px; padding: 25px; background: #1a202c; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #4a5568; }
        .titulo { text-align: center; color: #fff; text-shadow: 2px 2px 0px #e53e3e; font-size: 1.6rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .contador-box { background: #ecc94b; color: #1a202c; text-align: center; padding: 12px; font-weight: 900; border-radius: 8px; font-size: 1.1rem; }
        
        /* Controles */
        .controles-generar { display: flex; gap: 10px; }
        .controles-generar input { flex: 1; padding: 12px; border-radius: 6px; border: none; font-size: 1.1rem; font-weight: bold; text-align: center; }
        .controles-generar button { background: #ecc94b; color: #1a202c; border: none; padding: 0 20px; font-weight: 900; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .controles-generar button:hover { background: #d69e2e; }
        
        .buscador { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #4a5568; background: #2d3748; color: white; box-sizing: border-box; }
        
        /* Botones de Acción (Restaurados) */
        .botones-accion { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .botones-accion button { padding: 10px; border-radius: 6px; border: none; background: #edf2f7; color: #2d3748; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .botones-accion button:hover { background: #cbd5e0; }

        #contenedorLista { flex: 1; background: #2d3748; border-radius: 8px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; border: 1px solid #4a5568; }
        .id-card { background: #f7fafc; color: #1a202c; padding: 12px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; }
        .id-card.selected { border-color: #48bb78; background: #f0fff4; }
        
        /* Panel Derecho (Vista Previa) */
        .panel-derecho { flex: 1; background: #edf2f7; padding: 30px; display: flex; flex-direction: column; align-items: center; color: #2d3748; overflow-y: auto; }
        #visorDetallado { display: none; width: 100%; flex-direction: column; align-items: center; }
        #nombreVisor { font-size: 2rem; font-weight: 900; color: #2c5282; margin: 0; }
        #idVisor { background: #e53e3e; color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin: 10px 0; }
        
        table { border-collapse: collapse; width: 100%; max-width: 400px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 15px; }
        td { border: 2px solid #e2e8f0; width: 20%; padding: 15px; text-align: center; font-size: 1.3rem; font-weight: bold; }
        .header-bingo td { background: #2c5282; color: white; border: none; font-size: 1.5rem; padding: 10px; }
        
        .btn-juego { background: #e53e3e; color: white; text-align: center; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; border: none; width: 100%; text-decoration: none; font-size: 1.1rem; margin-top: 10px; }
        
        #seleccion-maestra { background: #48bb78; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="panel-izquierdo">
            <h1 class="titulo">BINGO PRO ADMIN</h1>
            
            <div class="contador-box">
                REGISTRADOS: <span id="countDisplay">0</span>
            </div>

            <div class="controles-generar">
                <input type="number" id="inputCantidad" placeholder="Cant.">
                <button id="btnGenerar">GENERAR LOTE</button>
            </div>

            <input type="text" id="buscador" class="buscador" placeholder="🔍 Buscar nombre o ID...">

            <div class="botones-accion">
                <button onclick="exportarBD()">💾 Guardar</button>
                <button onclick="document.getElementById('inputFile').click()">📂 Abrir</button>
                <button onclick="limpiarTodo()" style="color: #e53e3e;">🗑️ Borrar</button>
                <button onclick="verTodosLosCartones()">👁️ Ver Todos</button>
                <input type="file" id="inputFile" style="display:none" onchange="importarBD(this)">
            </div>

            <button onclick="generarLinkMultiple()" style="width:100%; padding:10px; background:#3182ce; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Copiar Link (Seleccionados)</button>

            <div id="seleccion-maestra">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>Cartones Listos: <span id="countSeleccion">0</span>/4</strong>
                    <button onclick="cancelarSeleccion()" style="background:transparent; border:none; color:white; font-weight:bold; cursor:pointer;">X</button>
                </div>
                <div id="listaSeleccionados" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
            </div>

            <div id="contenedorLista">
                </div>

            <a href="ruleta.html" class="btn-juego">IR AL JUEGO →</a>
        </div>

        <div class="panel-derecho">
            <div id="placeholderVisor" style="text-align: center; opacity: 0.5;">
                <h2 style="font-size: 2.5rem; margin-bottom: 0;">VISTA PREVIA</h2>
                <p>Toca un cartón para ver sus números</p>
            </div>

            <div id="visorDetallado">
                <h2 id="nombreVisor">-</h2>
                <span id="idVisor">-</span>
                <div id="tablaContenedor" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                    </div>
            </div>
        </div>
    </div>

    <script src="generar.js"></script>
</body>
</html>
