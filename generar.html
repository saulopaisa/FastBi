<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bingo Pro Admin - Generador</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database(); 
    </script>

    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .main-container { display: flex; width: 100%; max-width: 1200px; height: 95vh; background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Panel Izquierdo */
        .panel-izquierdo { width: 380px; padding: 20px; background: #0f172a; display: flex; flex-direction: column; gap: 10px; border-right: 2px solid #334155; }
        .titulo { text-align: center; color: #ef4444; margin: 0; font-size: 1.5rem; font-weight: 900; }
        
        /* ESPACIO DE LA LISTA: flex-grow: 1 para que use todo el alto */
        #contenedorLista { flex-grow: 1; overflow-y: auto; background: #1e293b; padding: 10px; border-radius: 8px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 10px; }

        .id-card { background: #fff; color: #000; padding: 12px; border-radius: 6px; cursor: pointer; border-left: 5px solid #ef4444; transition: 0.2s; }
        .id-card:hover { background: #f1f5f9; }
        .id-card.selected { border: 3px solid #22c55e; background: #f0fdf4; }

        .controles input, .buscador { padding: 12px; border-radius: 4px; border: none; width: 100%; box-sizing: border-box; font-weight: bold; }
        .btn-gen { background: #eab308; color: #000; font-weight: bold; padding: 0 15px; border: none; border-radius: 4px; cursor: pointer; }

        .botones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .botones-grid button { padding: 8px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; border: none; background: #334155; color: white; font-weight: bold; }

        /* Panel Derecho */
        .panel-derecho { flex: 1; background: #f8fafc; padding: 20px; color: #1e293b; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #visorDetallado { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        table { border-collapse: collapse; width: 100%; max-width: 350px; background: white; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        td { border: 1px solid #cbd5e1; padding: 12px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .header-bingo td { background: #1e3a8a; color: white; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="panel-izquierdo">
        <h1 class="titulo">BINGO PRO ADMIN</h1>
        <div style="background:#eab308; color:black; text-align:center; padding:8px; border-radius:4px; font-weight:900;">
            REGISTRADOS: <span id="countDisplay">0</span>
        </div>

        <div class="controles" style="display:flex; gap:5px;">
            <input type="number" id="inputCantidad" placeholder="Cantidad">
            <button class="btn-gen" onclick="window.generarLote()">GENERAR</button>
        </div>

        <div class="botones-grid">
            <button onclick="window.exportarBD()">💾 Guardar JSON</button>
            <button onclick="document.getElementById('inputFile').click()">📂 Abrir JSON</button>
            <button onclick="window.verTodosLosCartones()">👁️ Ver Todos</button>
            <button onclick="window.limpiarTodo()" style="color:#f87171;">🗑️ Borrar Todo</button>
            <input type="file" id="inputFile" style="display:none" onchange="window.importarBD(this)">
        </div>

        <input type="text" id="buscador" class="buscador" placeholder="🔍 Buscar por nombre o ID..." oninput="window.renderizarLista(this.value)">

        <div id="contenedorLista"></div>

        <a href="ruleta.html" style="background:#ef4444; color:white; text-align:center; padding:15px; border-radius:8px; text-decoration:none; font-weight:bold; margin-top: 5px;">IR AL JUEGO →</a>
    </div>

    <div class="panel-derecho">
        <div id="visorDetallado">
            <h2 id="nombreVisor" style="margin:0; color:#1e3a8a;">-</h2>
            <span id="idVisor" style="background:#ef4444; color:white; padding:2px 10px; border-radius:20px; font-size:0.8rem;">-</span>
            <div id="tablaContenedor"></div>
        </div>
        <div id="placeholderVisor" style="text-align:center; margin-top:100px; color:#94a3b8;">
            <h2 style="font-size: 2.5rem;">VISTA PREVIA</h2>
            <p>Selecciona un cartón de la lista para ver sus números</p>
        </div>
    </div>
</div>

<script src="generar.js"></script>
</body>
</html>
