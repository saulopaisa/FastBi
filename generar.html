<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bingo Pro Admin - Generador</title>
    <style>
        :root { --azul-fondo: #0f172a; --panel-gris: #1e293b; --dorado: #f59e0b; --rojo: #ef4444; }
        body { margin: 0; font-family: sans-serif; background: var(--azul-fondo); color: white; }
        .admin-layout { display: flex; height: 100vh; }
        .sidebar { width: 350px; background: var(--panel-gris); padding: 20px; border-right: 2px solid #334155; }
        .stats-box { background: var(--dorado); color: #1e293b; padding: 10px; text-align: center; font-weight: bold; border-radius: 6px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 6px; border: none; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-gen { background: var(--dorado); color: #1e293b; }
        .btn-juego { background: #3b82f6; color: white; margin-top: 20px; }
        .btn-borrar { background: var(--rojo); color: white; }
        .preview-area { flex: 1; background: #f1f5f9; color: #1e293b; display: flex; align-items: center; justify-content: center; }
        #lista-cartones { margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .card-item { background: #334155; padding: 10px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2 style="text-align:center; color: var(--rojo);">BINGO PRO ADMIN</h2>
            
            <div id="contadorRegistrados" class="stats-box">REGISTRADOS: 0</div>

            <div class="input-group">
                <input type="number" id="cantidadGenerar" placeholder="Cantidad de cartones (1-500)">
            </div>
            
            <button onclick="window.generarLote()" class="btn-gen">GENERAR LOTE</button>

            <div id="lista-cartones"></div>

            <button onclick="window.borrarTodo()" class="btn-borrar">BORRAR TODO</button>
            
            <button id="btnIrJuego" class="btn-juego">IR AL JUEGO →</button>
        </aside>

        <main class="preview-area">
            <div id="vista-previa-contenido">
                <h3 style="text-align:center;">VISTA PREVIA</h3>
                <p>Selecciona un cartón para ver sus números</p>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="generar.js"></script>
</body>
</html>
