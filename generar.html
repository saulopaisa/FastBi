<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { display: flex; max-width: 1000px; width: 100%; background: #0f172a; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .panel-izquierdo { width: 40%; padding: 20px; background: #1e293b; color: white; display: flex; flex-direction: column; gap: 15px; }
        .panel-derecho { width: 60%; background: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .titulo { text-align: center; color: #fff; text-shadow: 2px 2px 0px #ef4444; font-size: 1.5rem; font-weight: 900; margin: 0; }
        .contador-box { background: #eab308; color: #000; text-align: center; padding: 10px; font-weight: bold; border-radius: 5px; }
        
        .controles-generar { display: flex; gap: 10px; }
        .controles-generar input { flex: 1; padding: 10px; border-radius: 5px; border: none; font-size: 1rem; }
        .controles-generar button { background: #eab308; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        .buscador { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        
        .botones-accion { display: flex; gap: 5px; justify-content: space-between; }
        .botones-accion button { padding: 8px 12px; border-radius: 5px; border: none; background: #f8fafc; font-size: 0.8rem; font-weight: bold; cursor: pointer; flex: 1; }
        
        #contenedorLista { flex: 1; background: #0f172a; border-radius: 5px; padding: 10px; overflow-y: auto; max-height: 300px; display: flex; flex-direction: column; gap: 10px; }
        .id-card { background: white; color: black; padding: 10px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .id-card.selected { border-color: #25d366; background: #e6ffed; }
        
        .btn-juego { background: #ef4444; color: white; text-align: center; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; width: 100%; text-decoration: none; display: block; margin-top: auto; }
        
        /* Visor de Cartón */
        table { border-collapse: collapse; width: 80%; margin-top: 15px; background: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { border: 2px solid #cbd5e1; padding: 15px; font-size: 1.2rem; font-weight: bold; }
        td:nth-child(3) { background: #f1f5f9; } /* Columna N ligeramente diferente */
        
        /* Panel Selección Maestra (Links Múltiples) */
        #seleccion-maestra { background: #25d366; padding: 10px; border-radius: 5px; margin-top: 10px; flex-direction: column; gap: 5px; display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="panel-izquierdo">
            <h1 class="titulo">BINGO PRO ADMIN</h1>
            
            <div class="contador-box">
                REGISTRADOS: <span id="countDisplay">0</span>
            </div>

            <div class="controles-generar">
                <input type="number" id="inputCantidad" placeholder="2" min="1">
                <button id="btnGenerar">GENERAR LOTE</button>
            </div>

            <input type="text" id="buscador" class="buscador" placeholder="🔍 Buscar nombre o ID...">

            <div class="botones-accion">
                <button onclick="generarLinkMultiple()">Copiar Link</button>
                <button onclick="limpiarTodo()" style="color: red;">Borrar Todo</button>
            </div>

            <div id="seleccion-maestra">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>Cartones Seleccionados: <span id="countSeleccion">0</span>/4</strong>
                    <button onclick="cancelarSeleccion()" style="background:transparent; border:none; color:white; font-weight:bold; cursor:pointer;">X</button>
                </div>
                <div id="listaSeleccionados" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
            </div>

            <div id="contenedorLista">
                </div>

            <a href="ruleta.html" class="btn-juego">IR AL JUEGO →</a>
        </div>

        <div class="panel-derecho">
            
            <div id="placeholderVisor" style="text-align: center; color: #94a3b8;">
                <h2 style="color: #64748b; margin-bottom: 5px;">VISTA PREVIA</h2>
                <p>Toca un cartón para ver sus números</p>
            </div>

            <div id="visorDetallado" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                <h2 id="nombreVisor" style="margin: 0; color: #1e293b; font-size: 1.8rem; text-transform: uppercase;">-</h2>
                <span id="idVisor" style="background: #ef4444; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 5px;">-</span>
                
                <table id="tablaVisor">
                    </table>
            </div>

        </div>

    </div>

    <script src="generar.js"></script>

</body>
</html>
