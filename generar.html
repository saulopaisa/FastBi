<div class="main-container">
        <div class="panel-izquierdo">
            <h1 class="titulo">BINGO PRO ADMIN</h1>
            <div class="contador-box">REGISTRADOS: <span id="countDisplay">0</span></div>

            <div class="controles-generar">
                <input type="number" id="inputCantidad" placeholder="2" min="1">
                <button id="btnGenerar">GENERAR LOTE</button>
            </div>

            <input type="text" id="buscador" class="buscador" placeholder="🔍 Buscar nombre o ID...">

            <div class="botones-accion" style="flex-wrap: wrap;">
                <button onclick="exportarBD()">💾 Guardar</button>
                <button onclick="document.getElementById('inputFile').click()">📂 Abrir</button>
                <button onclick="limpiarTodo()" style="color: #ef4444;">🗑️ Borrar</button>
                <button onclick="verTodosLosCartones()">👁️ Ver Todos</button>
                <input type="file" id="inputFile" style="display:none" onchange="importarBD(this)">
            </div>

            <button onclick="generarLinkMultiple()" style="width:100%; padding:10px; margin-top:5px; background:#2563eb; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Copiar Link de Seleccionados</button>

            <div id="seleccion-maestra">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>Seleccionados: <span id="countSeleccion">0</span>/4</strong>
                    <button onclick="cancelarSeleccion()" style="background:transparent; border:none; color:white; font-weight:bold; cursor:pointer;">X</button>
                </div>
                <div id="listaSeleccionados" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
            </div>

            <div id="contenedorLista"></div>
            <a href="ruleta.html" class="btn-juego">IR AL JUEGO →</a>
        </div>

        <div class="panel-derecho">
            <div id="placeholderVisor" style="text-align: center; color: #94a3b8;">
                <h2>VISTA PREVIA</h2>
                <p>Toca un cartón para ver sus números</p>
            </div>
            <div id="visorDetallado" style="display: none; flex-direction: column; align-items: center; width: 100%; overflow-y: auto;">
                <h2 id="nombreVisor">-</h2>
                <span id="idVisor">-</span>
                <div id="tablaContenedor" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                    <table id="tablaVisor"></table>
                </div>
            </div>
        </div>
    </div>
<script src="generar.js"></script>
