<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bingo Pro Admin - Generador</title>
    <style>
        /* RESTAURACIÓN DE DISEÑO ORIGINAL */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0f1a; display: flex; height: 100vh; color: white; }
        
        .sidebar { width: 340px; background: #16213e; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #2d3436; box-sizing: border-box; }
        .main-content { flex: 1; background: #f8fafc; display: flex; align-items: center; justify-content: center; }

        .titulo { color: #ff4d4d; text-align: center; font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        
        .btn-registrados { background: #ffca28; color: #16213e; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-bottom: 15px; font-size: 1rem; }
        
        .input-lote-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-lote-group input { flex: 1; padding: 10px; border-radius: 4px; border: none; text-align: center; font-weight: bold; }
        .btn-generar { background: #ffca28; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; color: #16213e; }

        /* Cuadrícula 2x2 de botones */
        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-tool { background: #2d3748; color: #edf2f7; border: none; padding: 10px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-tool:hover { background: #4a5568; }

        .lista-cartones { flex: 1; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 10px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .card-mini { background: #1e293b; padding: 10px; border-radius: 4px; margin-bottom: 8px; cursor: pointer; border-left: 4px solid #ff4d4d; }

        .btn-ir-juego { background: #ff4d4d; color: white; border: none; padding: 16px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }
        
        /* Vista Previa */
        .preview-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; color: #64748b; width: 80%; max-width: 500px; }
        .preview-card h2 { color: #94a3b8; font-size: 2.5rem; margin: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="titulo">BINGO PRO ADMIN</div>
        
        <div id="contadorRegistrados" class="btn-registrados">REGISTRADOS: 0</div>

        <div class="input-lote-group">
            <input type="number" id="cantidadGenerar" placeholder="4">
            <button class="btn-generar" onclick="window.generarLote()">GENERAR</button>
        </div>

        <div class="grid-tools">
            <button class="btn-tool" onclick="window.exportarJSON()">💾 Guardar JSON</button>
            <button class="btn-tool" onclick="document.getElementById('inputFile').click()">📂 Abrir JSON</button>
            <button class="btn-tool" onclick="window.verTodos()">👁️ Ver Todos</button>
            <button class="btn-tool" onclick="window.borrarTodo()">🗑️ Borrar Todo</button>
        </div>
        
        <input type="file" id="inputFile" style="display:none" onchange="window.importarJSON(event)">

        <div class="lista-cartones" id="listaCartonesContainer">
            </div>

        <button class="btn-ir-juego" onclick="location.href='ruleta.html'">IR AL JUEGO →</button>
    </div>

    <div class="main-content">
        <div id="vista-previa-contenido" class="preview-card">
            <h2>VISTA PREVIA</h2>
            <p>Selecciona un cartón para inspeccionar</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="generar.js"></script>
</body>
</html>
