<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bingo 75 Pro - Panel de Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 2px solid #334155; }
        .main-content { flex: 1; background: #f1f5f9; padding: 20px; overflow-y: auto; color: #1e293b; }
        
        /* Tablero */
        .grid-tablero { display: grid; grid-template-columns: repeat(15, 1fr); gap: 5px; background: white; padding: 15px; border-radius: 8px; }
        .celda { border: 1px solid #cbd5e1; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #94a3b8; border-radius: 4px; }
        .celda.marcada { background: #eab308; color: #000; border-color: #ca8a04; transform: scale(1.05); }

        /* Controles */
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: #ef4444; color: white; font-size: 1.1rem; }
        .btn-secondary { background: #334155; color: white; }
        
        /* Verificador Visual */
        #visor-verificacion { background: white; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bingo-table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        .bingo-table td { border: 1px solid #ddd; padding: 8px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:#ef4444; text-align:center; margin:0;">BINGO 75</h2>
        
        <div style="background:#0f172a; padding:15px; border-radius:8px; text-align:center;">
            <div id="balota-actual" style="font-size: 4rem; font-weight: 900; color: #ef4444;">--</div>
            <div id="letra-actual" style="font-size: 1.5rem; color: #94a3b8;">Sorteando...</div>
        </div>

        <button class="btn btn-primary" onclick="window.sortearProximo()">SORTEAR PRÓXIMO</button>
        
        <div style="display:flex; gap:5px;">
            <input type="number" id="inputTiempo" placeholder="Min" style="width:60px; padding:10px; border-radius:4px; border:none;">
            <button class="btn btn-secondary" style="flex:1;" onclick="window.programarJuego()">PROGRAMAR</button>
        </div>

        <div id="historial-balotas" style="background:#0f172a; flex-grow:1; border-radius:8px; padding:10px; overflow-y:auto; font-size:0.9rem;">
            </div>

        <div style="border-top:1px solid #334155; pt:10px;">
            <input type="number" id="inputVerificador" placeholder="ID Cartón" style="width:100%; padding:10px; margin-bottom:5px; border-radius:4px;">
            <button class="btn btn-secondary" style="width:100%;" onclick="window.revisarCartonManual()">VERIFICAR CARTÓN</button>
        </div>

        <button class="btn btn-secondary" onclick="window.reiniciarPartida()" style="background:#475569;">REINICIAR TODO</button>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="margin:0;">TABLERO DE SEGUIMIENTO</h1>
            <a href="generar.html" style="text-decoration:none; background:#1e293b; color:white; padding:8px 15px; border-radius:4px; font-size:0.8rem;">+ GESTIONAR CARTONES</a>
        </div>

        <div class="grid-tablero" id="tablero-principal"></div>

        <div id="visor-verificacion">
            <h3 id="titulo-verificador" style="margin:0; color:#1e3a8a;">Verificando...</h3>
            <div id="tabla-verificador-contenedor"></div>
        </div>
        
        <div id="placeholder-ruleta" style="text-align:center; margin-top:50px; color:#94a3b8;">
            <p>Esperando sorteo o verificación de ID...</p>
        </div>
    </div>

    <script src="ruleta.js"></script>
</body>
</html>
