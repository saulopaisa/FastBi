<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador</title>
    <style>
        /* CSS RECONSTRUIDO SEGÚN TUS CAPTURAS */
        body { margin: 0; font-family: Arial, sans-serif; background: #0b0f1a; display: flex; height: 100vh; color: white; }
        
        .sidebar { width: 320px; background: #16213e; padding: 15px; display: flex; flex-direction: column; border-right: 1px solid #2d3436; }
        .main-content { flex: 1; background: #ffffff; color: #7f8c8d; display: flex; align-items: center; justify-content: center; flex-direction: column; }

        .titulo { color: #ff4d4d; text-align: center; font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        
        .btn-registrados { background: #ffca28; color: black; border: none; padding: 10px; border-radius: 4px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 8px; border-radius: 4px; border: none; }
        .btn-generar { background: #ffca28; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .btn-small { background: #2c3e50; color: #ecf0f1; border: none; padding: 8px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        .search-bar { width: 100%; padding: 8px; border-radius: 4px; border: none; margin-bottom: 10px; box-sizing: border-box; }

        .lista-container { flex: 1; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .card-jugador { background: white; color: black; border-radius: 6px; padding: 10px; margin-bottom: 8px; border-left: 5px solid #ff4d4d; position: relative; cursor: pointer; }
        .card-jugador h4 { margin: 0; color: #ff4d4d; font-size: 0.9rem; }
        .card-jugador p { margin: 3px 0 0 0; font-size: 0.85rem; }

        .btn-ir-juego { background: #ff4d4d; color: white; border: none; padding: 15px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; margin-top: auto; }
        
        h2.vista-previa-txt { font-size: 2.5rem; color: #bdc3c7; margin: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="titulo">BINGO PRO ADMIN</div>
        
        <button class="btn-registrados" id="contadorRegistrados">REGISTRADOS: 0</button>

        <div class="input-group">
            <input type="number" id="cantidadGenerar" placeholder="Cant.">
            <button class="btn-generar" onclick="window.generarLote()">GENERAR</button>
        </div>

        <div class="grid-buttons">
            <button class="btn-small">💾 Guardar JSON</button>
            <button class="btn-small">📂 Abrir JSON</button>
            <button class="btn-small" onclick="window.verTodos()">👁️ Ver Todos</button>
            <button class="btn-small" onclick="window.borrarTodo()">🗑️ Borrar Todo</button>
        </div>

        <input type="text" class="search-bar" placeholder="Buscar nombre o ID...">

        <div class="lista-container" id="listaCartones">
            </div>

        <button class="btn-ir-juego" onclick="location.href='ruleta.html'">IR AL JUEGO →</button>
    </div>

    <div class="main-content">
        <div id="vista-previa-contenido" style="text-align: center;">
            <h2 class="vista-previa-txt">VISTA PREVIA</h2>
            <p>Selecciona un cartón de la lista</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",

        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="generar.js"></script>
</body>
</html>
