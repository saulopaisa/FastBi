<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database(); 
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; }
        .main-container { display: flex; max-width: 1200px; width: 100%; height: 95vh; background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        /* Panel Izquierdo: Layout Vertical */
        .panel-izquierdo { width: 400px; padding: 20px; background: #0f172a; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #334155; }
        .titulo { text-align: center; color: #fff; text-shadow: 2px 2px 0px #ef4444; font-size: 1.4rem; font-weight: 900; margin: 0; }
        
        .contador-box { background: #eab308; color: #000; text-align: center; padding: 10px; font-weight: 900; border-radius: 6px; }
        
        .controles-generar { display: flex; gap: 8px; }
        .controles-generar input { flex: 1; padding: 10px; border-radius: 4px; border: none; font-weight: bold; text-align: center; }
        .controles-generar button { background: #eab308; color: #000; border: none; padding: 0 15px; font-weight: 900; border-radius: 4px; cursor: pointer; }

        /* Botones de Gestión */
        .botones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .botones-grid button { padding: 8px; border-radius: 4px; border: none; background: #334155; color: white; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .botones-grid button:hover { background: #475569; }

        /* EL ESPACIO DE LA LISTA: Ahora ocupa todo el resto del panel */
        #contenedorLista { flex-grow: 1; background: #1e293b; border-radius: 6px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; border: 1px solid #334155; margin-bottom: 5px; }
        
        .id-card { background: #fff; color: #000; padding: 10px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; }
        .id-card.selected { border-color: #22c55e; background: #f0fdf4; }
        
        /* Panel Derecho */
        .panel-derecho { flex: 1; background: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #1e293b; overflow-y: auto; }
        #visorDetallado { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        table { border-collapse: collapse; width: 100%; max-width: 350px; background: white; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        td { border: 1px solid #cbd5e1; width: 20%; padding: 12px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .header-bingo td { background: #1e3a8a; color: white; border: none; }
        
        .btn-juego { background: #ef4444; color: white; text-align: center; padding: 15px; border-radius: 6px; font-weight: 900; cursor: pointer; border: none; width: 100%; text-decoration: none; margin-top: auto; }
        
        #seleccion-maestra { background: #22c55e; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: none; flex-direction: column; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="panel-izquierdo">
            <h1 class="titulo">BINGO PRO ADMIN</h1>
            
            <div class="contador-box">REGISTRADOS: <span id="countDisplay">0</span></div>

            <div class="controles-generar">
                <input type="number" id="inputCantidad" placeholder="Cant.">
                <button onclick="generarLote()">GENERAR</button>
            </div>

            <div class="botones-grid">
                <button onclick="exportarBD()">💾 Guardar JSON</button>
                <button onclick="document.getElementById('inputFile').click()">📂 Abrir JSON</button>
                <button onclick="verTodosLosCartones()">👁️ Ver Todos</button>
                <button onclick="limpiarTodo()" style="color: #f87171;">🗑️ Borrar Todo</button>
                <input type="file" id="inputFile" style="display:none" onchange="importarBD(this)">
            </div>

            <input type="text" id="buscador" style="width:100%; padding:10px; border-radius:4px; border:none; background:#1e293b; color:white;" placeholder="🔍 Buscar...">

            <div id="seleccion-maestra">
                <div style="display:flex; justify-content:space-between;">
                    <strong>Listos: <span id="countSeleccion">0</span>/4</strong>
                    <button onclick="cancelarSeleccion()" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;">X</button>
                </div>
                <div id="listaSeleccionados"></div>
                <button onclick="generarLinkMultiple()" style="margin-top:5px; background:#1e293b; color:white; border:none; padding:5px; border-radius:4px; font-weight:bold; cursor:pointer;">Copiar Link</button>
            </div>

            <div id="contenedorLista"></div>

            <a href="ruleta.html" class="btn-juego">IR AL JUEGO →</a>
        </div>

        <div class="panel-derecho">
            <div id="placeholderVisor" style="text-align: center; margin-top: 100px; color: #94a3b8;">
                <h2 style="font-size: 2rem;">VISTA PREVIA</h2>
                <p>Selecciona un cartón para inspeccionar</p>
            </div>

            <div id="visorDetallado">
                <h2 id="nombreVisor" style="margin:0; color:#1e3a8a;">-</h2>
                <span id="idVisor" style="background:#ef4444; color:white; padding:2px 10px; border-radius:20px; font-size:0.8rem;">-</span>
                <div id="tablaContenedor"></div>
            </div>
        </div>
    </div>

    <script src="generar.js"></script>
</body>
</html>
