<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador de Cartones</title>
    <link rel="stylesheet" href="generar.css">
</head>
<body>
    <div class="sidebar">
        <div class="titulo">🎯 BINGO PRO</div>
        <div class="subtitulo">Generador de Cartones</div>
        
        <div id="contadorRegistrados" class="btn-contador">🎫 CARTONES: 0</div>

        <div class="input-lote-group">
            <input type="number" id="cantidadGenerar" placeholder="Cant." min="1" max="100" value="1">
            <button class="btn-generar" id="btnGenerar">⚡ GENERAR</button>
        </div>

        <div class="grid-tools">
            <button class="btn-tool" id="btnGuardar">💾 Guardar</button>
            <button class="btn-tool" id="btnAbrir">📂 Abrir</button>
            <button class="btn-tool pdf" id="btnPDF">📄 PDF</button>
            <button class="btn-tool links" id="btnLinks">🔗 Links</button>
            <button class="btn-tool jugadores" id="btnJugadores">👥 Jugadores</button>
            <button class="btn-tool danger" id="btnBorrar">🗑️ Borrar</button>
        </div>
        
        <button class="btn-asignar" id="btnAsignar" style="display:none;">👤 ASIGNAR A JUGADOR</button>
        <button class="btn-buscar-jugador" id="btnBuscarJugador">🔍 BUSCAR JUGADOR</button>
        
        <input type="file" id="fileIn" style="display:none" accept=".json">

        <div class="buscador">
            <input type="text" id="buscadorCartones" placeholder="🔍 Buscar cartón...">
        </div>

        <div class="seleccionar-todos-container">
            <label class="checkbox-label">
                <input type="checkbox" id="checkTodos">
                <span>Seleccionar todos los cartones</span>
            </label>
            <span id="cantidadSeleccionados" class="cantidad-seleccionados">0 seleccionados</span>
        </div>

        <div class="lista-container" id="listaCartones">
            <p style="color:#94a3b8; text-align:center; padding:20px;">No hay cartones generados aún</p>
        </div>

        <button class="btn-ir-juego" id="btnIrJuego">🎮 IR AL JUEGO →</button>
    </div>

    <div class="main-content">
        <div id="vista-previa-contenido" class="preview-box">
            <div class="preview-empty">
                <h2>👁️ VISTA PREVIA</h2>
                <p>Selecciona un cartón para verlo en detalle</p>
                <p style="font-size:0.8rem; margin-top:20px;">💡 Selecciona varios cartones y asígnalos a un jugador</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        console.log('🔥 Firebase listo');
    </script>
    <script src="generar.js"></script>
</body>
</html>
