<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador de Cartones</title>
    <link rel="stylesheet" href="generar.css">
</head>
<body>
    <!-- SIDEBAR IZQUIERDO -->
    <div class="sidebar">
        <div class="titulo">🎯 BINGO PRO</div>
        <div class="subtitulo">Generador de Cartones</div>
        
        <!-- Contador -->
        <div id="contadorRegistrados" class="btn-contador">
            🎫 CARTONES: 0
        </div>

        <!-- Generar lote -->
        <div class="input-lote-group">
            <input type="number" id="cantidadGenerar" placeholder="Cant." min="1" max="100" value="1">
            <button class="btn-generar" id="btnGenerar">
                ⚡ GENERAR
            </button>
        </div>

        <!-- Herramientas -->
        <div class="grid-tools">
            <button class="btn-tool" id="btnGuardar">
                💾 Guardar
            </button>
            <button class="btn-tool" id="btnAbrir">
                📂 Abrir
            </button>
            <button class="btn-tool pdf" id="btnPDF">
                📄 PDF
            </button>
            <button class="btn-tool links" id="btnLinks">
                🔗 Links
            </button>
            <button class="btn-tool" id="btnSelTodos">
                ✅ Todos
            </button>
            <button class="btn-tool danger" id="btnBorrar">
                🗑️ Borrar
            </button>
        </div>
        
        <input type="file" id="fileIn" style="display:none" accept=".json">

        <!-- Buscador -->
        <div class="buscador">
            <input type="text" id="buscadorCartones" placeholder="🔍 Buscar cartón...">
        </div>

        <!-- Lista de cartones -->
        <div class="lista-container" id="listaCartones">
            <p style="color:#94a3b8; text-align:center; padding:20px;">
                No hay cartones generados aún
            </p>
        </div>

        <!-- Ir al juego -->
        <button class="btn-ir-juego" id="btnIrJuego">
            🎮 IR AL JUEGO →
        </button>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">
        <div id="vista-previa-contenido" class="preview-box">
            <div class="preview-empty">
                <h2>👁️ VISTA PREVIA</h2>
                <p>Selecciona un cartón para verlo en detalle</p>
                <p style="font-size:0.8rem; margin-top:20px;">
                    💡 Tip: Genera cartones y asígnalos a jugadores
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <!-- Script principal -->
    <script src="generar.js"></script>
</body>
</html>
