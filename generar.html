<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro Admin - Generador</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; overflow: hidden; }
        .contenedor-admin { display: flex; height: 100vh; }
        
        /* Panel Lateral Oscuro */
        .panel-control { width: 350px; background: #1e293b; padding: 25px; border-right: 2px solid #334155; display: flex; flex-direction: column; }
        .titulo-admin { color: #ef4444; text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; }
        
        /* Caja de Estadísticas Amarilla */
        .stats { background: #f59e0b; color: #1e293b; padding: 12px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 20px; font-size: 1.1rem; }
        
        /* Inputs y Botones */
        .input-lote { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 2px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        .btn-primario { width: 100%; padding: 14px; background: #f59e0b; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #1e293b; transition: 0.3s; }
        .btn-primario:hover { background: #d97706; }
        
        .btn-secundario { width: 100%; padding: 12px; background: #ef4444; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .btn-juego { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-top: auto; }
        
        /* Lista de Cartones */
        #lista-cartones { flex: 1; margin: 20px 0; overflow-y: auto; padding-right: 5px; }
        .card-item { background: #334155; padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border: 1px solid #475569; transition: 0.2s; }
        .card-item:hover { background: #475569; border-color: #f59e0b; }

        /* Área de Vista Previa Clara */
        .vista-previa { flex: 1; background: #f1f5f9; padding: 40px; display: flex; align-items: center; justify-content: center; }
        #vista-previa-contenido { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); color: #1e293b; min-width: 300px; text-align: center; }
    </style>
</head>
<body>
    <div class="contenedor-admin">
        <aside class="panel-control">
            <h1 class="titulo-admin">BINGO PRO ADMIN</h1>
            
            <div id="contadorRegistrados" class="stats">REGISTRADOS: 0</div>

            <input type="number" id="cantidadGenerar" class="input-lote" placeholder="Cantidad a generar">
            
            <button onclick="window.generarLote()" class="btn-primario">GENERAR LOTE</button>
            
            <div id="lista-cartones">
                </div>

            <button onclick="window.borrarTodo()" class="btn-secundario">BORRAR TODO</button>
            
            <button id="btnIrJuego" class="btn-juego">IR AL JUEGO →</button>
        </aside>

        <main class="vista-previa">
            <div id="vista-previa-contenido">
                <h3 style="margin: 0;">VISTA PREVIA</h3>
                <p style="color: #64748b;">Selecciona un cartón del panel izquierdo para visualizar sus números.</p>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="generar.js"></script>
</body>
</html>
