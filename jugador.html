<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Jugador</title>
    <style>
        :root {
            --bg-dark: #0b0f1a;
            --sidebar-bg: #16213e;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --text-dark: #1e293b;
            --red: #ff4d4d;
            --gold: #ffb703;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            padding: 10px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(180deg, var(--sidebar-bg), #0f172a);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #2d3436;
        }

        .header h1 { color: var(--red); font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; }
        .header .jugador-nombre { color: var(--success); font-size: 1.2rem; font-weight: bold; }

        .numeros-section {
            background: var(--sidebar-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2d3436;
        }

        .numeros-section h3 { color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; text-align: center; }

        .ultima-bola-jugador {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .bola-grande {
            background: linear-gradient(135deg, #ff4d4d, #dc2626);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
            animation: pulse 1s infinite;
        }

        .bola-grande .letra { font-size: 1.3rem; font-weight: 900; line-height: 1; }
        .bola-grande .numero { font-size: 2rem; font-weight: 900; line-height: 1; }

        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

        .ultimos-numeros { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }

        .num-chico {
            background: white;
            color: var(--text-dark);
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.75rem;
            border: 2px solid #e2e8f0;
        }

        .num-chico.cantado {
            background: linear-gradient(135deg, #ffca28, #ffb300);
            color: #16213e;
            border-color: #f59e0b;
        }

        .num-chico.vacio {
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            color: #cbd5e1;
        }

        .cartones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .carton-card {
            background: white;
            color: var(--text-dark);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #e2e8f0;
            position: relative;
        }

        .carton-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        .carton-card.seleccionado {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16,185,129,0.4);
            background: #f0fdf4;
        }

        .carton-card .carton-check {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .carton-card.seleccionado .carton-check { background: var(--success); color: white; }

        .carton-numero { text-align: center; font-size: 0.9rem; font-weight: 900; color: var(--red); margin-bottom: 8px; }

        .carton-tabla { width: 100%; border-collapse: collapse; }
        .carton-tabla th { background: #ff4d4d; color: white; padding: 5px; font-size: 0.65rem; border: 1px solid #e2e8f0; }
        .carton-tabla td { padding: 5px; border: 1px solid #e2e8f0; text-align: center; font-weight: bold; font-size: 0.7rem; }
        .carton-tabla td.free { background: #fef3c7; font-size: 0.8rem; }
        .carton-tabla td.marcado { background: #10b981 !important; color: white !important; }

        .btn-bingo-container { text-align: center; margin-bottom: 15px; }

        .btn-bingo {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
            animation: glowBingo 2s infinite;
        }

        .btn-bingo:hover { transform: scale(1.05); }
        .btn-bingo:disabled { background: #6b7280 !important; opacity: 0.5; cursor: not-allowed; animation: none; }

        @keyframes glowBingo { 0%,100%{box-shadow:0 4px 20px rgba(239,68,68,0.4);} 50%{box-shadow:0 4px 35px rgba(239,68,68,0.8);} }

        .bingo-info { text-align: center; color: var(--text-gray); font-size: 0.8rem; margin-top: 8px; }

        .estado-juego { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .estado-juego.esperando { background: #334155; color: #94a3b8; }
        .estado-juego.jugando { background: #10b981; color: white; }
        .estado-juego.terminado { background: #ef4444; color: white; }

        @media (max-width: 600px) {
            .cartones-grid { grid-template-columns: repeat(2, 1fr); }
            .bola-grande { width: 60px; height: 60px; }
            .bola-grande .numero { font-size: 1.5rem; }
            .btn-bingo { padding: 14px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 BINGO PRO</h1>
            <div class="jugador-nombre" id="jugadorNombre">Cargando...</div>
        </div>

        <div class="estado-juego esperando" id="estadoJuego">⏳ Esperando que inicie el juego...</div>

        <div class="numeros-section">
            <h3>📊 NÚMEROS CANTADOS</h3>
            <div class="ultima-bola-jugador">
                <div class="bola-grande" id="ultimaBolaJugador">
                    <span class="letra">-</span>
                    <span class="numero">--</span>
                </div>
                <div style="text-align:center;">
                    <div style="color:#94a3b8;font-size:0.75rem;">Total</div>
                    <div style="font-size:1.5rem;font-weight:900;color:#ffca28;" id="totalCantados">0/75</div>
                </div>
            </div>
            <div class="ultimos-numeros" id="ultimosNumeros">
                <span class="num-chico vacio">--</span><span class="num-chico vacio">--</span>
                <span class="num-chico vacio">--</span><span class="num-chico vacio">--</span>
                <span class="num-chico vacio">--</span>
            </div>
        </div>

        <div class="cartones-grid" id="cartonesGrid">
            <p style="color:#94a3b8;text-align:center;grid-column:1/-1;padding:40px;">Cargando cartones...</p>
        </div>

        <div class="btn-bingo-container">
            <button class="btn-bingo" id="btnBingo" disabled onclick="cantarBingo()">🚨 ¡BINGO!</button>
            <div class="bingo-info" id="bingoInfo">Selecciona un cartón para cantar BINGO</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Leer datos cifrados de la URL
        const params = new URLSearchParams(window.location.search);
        let NOMBRE_JUGADOR = 'Jugador';
        let CARTONES_IDS = [];
        let SALA_ID = 'sala-default';

        const datosCodificados = params.get('d');
        if (datosCodificados) {
            try {
                const decoded = JSON.parse(decodeURIComponent(atob(datosCodificados)));
                NOMBRE_JUGADOR = decoded.n || 'Jugador';
                CARTONES_IDS = decoded.c || [];
                SALA_ID = decoded.s || 'sala-default';
                
                // Verificar expiración (24 horas)
                const tiempoLink = decoded.t || 0;
                const horas = (Date.now() - tiempoLink) / (1000 * 60 * 60);
                if (horas > 24) {
                    document.body.innerHTML = '<div style="text-align:center;padding:50px;color:#ef4444;font-size:1.2rem;">❌ Este link ha expirado.<br>Pide un nuevo link al administrador.</div>';
                    throw new Error('Link expirado');
                }
            } catch(e) {
                console.error('Error al decodificar link');
            }
        }

        let cartonesJugador = [];
        let numerosCantados = [];
        let cartonSeleccionado = null;

        console.log('👤 Jugador:', NOMBRE_JUGADOR);
        console.log('🎫 Cartones:', CARTONES_IDS.length);

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('jugadorNombre').textContent = '👤 ' + NOMBRE_JUGADOR;
            
            if (CARTONES_IDS.length === 0) {
                document.getElementById('cartonesGrid').innerHTML = 
                    '<p style="color:#ef4444;text-align:center;grid-column:1/-1;padding:40px;">❌ Link inválido. Contacta al administrador.</p>';
                return;
            }
            
            cargarCartones();
            escucharNumeros();
        });

        function cargarCartones() {
            db.ref('salas/' + SALA_ID + '/cartones').once('value', function(snap) {
                cartonesJugador = [];
                CARTONES_IDS.forEach(function(id) {
                    const carton = snap.child(id).val();
                    if (carton) cartonesJugador.push(carton);
                });
                
                if (cartonesJugador.length === 0) {
                    document.getElementById('cartonesGrid').innerHTML = 
                        '<p style="color:#ef4444;text-align:center;grid-column:1/-1;padding:40px;">❌ Cartones no encontrados</p>';
                    return;
                }
                
                mostrarCartones();
            });
        }

        function mostrarCartones() {
            const grid = document.getElementById('cartonesGrid');
            grid.innerHTML = '';
            
            cartonesJugador.forEach(function(c, index) {
                const card = document.createElement('div');
                card.className = 'carton-card';
                card.setAttribute('data-index', index);
                if (cartonSeleccionado === index) card.classList.add('seleccionado');
                card.onclick = function() { seleccionarCarton(index); };
                
                let tablaHTML = '<table class="carton-tabla"><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>';
                if (c.carton) {
                    for (let f = 0; f < 5; f++) {
                        tablaHTML += '<tr>';
                        ['B','I','N','G','O'].forEach(function(l) {
                            const valor = c.carton[l][f];
                            const centro = (l === 'N' && f === 2);
                            const cantado = numerosCantados.includes(valor);
                            tablaHTML += '<td class="' + (centro ? 'free' : '') + (cantado ? ' marcado' : '') + '">' + (centro ? '⭐' : valor) + '</td>';
                        });
                        tablaHTML += '</tr>';
                    }
                }
                tablaHTML += '</table>';
                
                card.innerHTML = 
                    '<div class="carton-check">' + (cartonSeleccionado === index ? '✓' : '') + '</div>' +
                    '<div class="carton-numero">Cartón #' + (c.numero || (index+1)) + '</div>' + tablaHTML;
                
                grid.appendChild(card);
            });
            
            actualizarBtnBingo();
        }

        function seleccionarCarton(index) {
            cartonSeleccionado = (cartonSeleccionado === index) ? null : index;
            mostrarCartones();
        }

        function actualizarBtnBingo() {
            const btn = document.getElementById('btnBingo');
            const info = document.getElementById('bingoInfo');
            if (cartonSeleccionado !== null) {
                btn.disabled = false;
                info.textContent = 'Cartón #' + (cartonesJugador[cartonSeleccionado]?.numero || '?') + ' seleccionado';
                info.style.color = '#10b981';
            } else {
                btn.disabled = true;
                info.textContent = 'Selecciona un cartón para cantar BINGO';
                info.style.color = '#94a3b8';
            }
        }

        function cantarBingo() {
            if (cartonSeleccionado === null) return;
            const carton = cartonesJugador[cartonSeleccionado];
            if (confirm('¿Cantar BINGO con Cartón #' + (carton.numero||'?') + '?')) {
                db.ref('bingos/' + SALA_ID).push({
                    jugador: NOMBRE_JUGADOR,
                    cartonId: carton.id,
                    cartonNumero: carton.numero,
                    timestamp: Date.now()
                }).then(function() {
                    alert('✅ ¡BINGO cantado! Espera verificación.');
                    document.getElementById('btnBingo').disabled = true;
                    document.getElementById('btnBingo').textContent = '✅ BINGO CANTADO';
                    document.getElementById('btnBingo').style.background = '#10b981';
                });
            }
        }

        function escucharNumeros() {
            db.ref('partidas/' + SALA_ID).on('value', function(snap) {
                const data = snap.val();
                if (data) {
                    const estadoEl = document.getElementById('estadoJuego');
                    if (data.estado === 'jugando' || data.estado === 'iniciando') {
                        estadoEl.className = 'estado-juego jugando';
                        estadoEl.textContent = '▶️ Juego en progreso';
                    } else if (data.estado === 'terminado') {
                        estadoEl.className = 'estado-juego terminado';
                        estadoEl.textContent = '🏁 Juego terminado' + (data.ganador ? ' - Ganador: ' + data.ganador : '');
                    }
                    
                    if (data.cantados && data.cantados.length > 0) {
                        numerosCantados = data.cantados;
                        actualizarDisplay(data);
                        mostrarCartones();
                    }
                }
            });
        }

        function actualizarDisplay(data) {
            if (data.ultimaBola) {
                const cont = document.getElementById('ultimaBolaJugador');
                cont.querySelector('.letra').textContent = obtenerLetra(data.ultimaBola);
                cont.querySelector('.numero').textContent = data.ultimaBola;
            }
            document.getElementById('totalCantados').textContent = numerosCantados.length + '/75';
            
            const ult = document.getElementById('ultimosNumeros');
            ult.innerHTML = '';
            const ultimos = numerosCantados.slice(-5).reverse();
            for (let i = 0; i < 5; i++) {
                const span = document.createElement('span');
                if (i < ultimos.length) {
                    span.className = 'num-chico cantado';
                    span.textContent = obtenerLetra(ultimos[i]) + '-' + ultimos[i];
                } else {
                    span.className = 'num-chico vacio';
                    span.textContent = '--';
                }
                ult.appendChild(span);
            }
        }

        function obtenerLetra(n) {
            if (n <= 15) return 'B';
            if (n <= 30) return 'I';
            if (n <= 45) return 'N';
            if (n <= 60) return 'G';
            return 'O';
        }
    </script>
</body>
</html>
