<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Jugador</title>
    <style>
        :root {
            --bg-dark: #0b0f1a;
            --sidebar-bg: #16213e;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --text-dark: #1e293b;
            --red: #ff4d4d;
            --gold: #ffb703;
            --success: #10b981;
            --blue: #3b82f6;
            --purple: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ============ HEADER ============ */
        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(180deg, var(--sidebar-bg), #0f172a);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #2d3436;
        }

        .header h1 {
            color: var(--red);
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .header .jugador-nombre {
            color: var(--success);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .header .sala-info {
            color: var(--text-gray);
            font-size: 0.7rem;
            margin-top: 3px;
        }

        /* ============ ÚLTIMOS NÚMEROS CANTADOS ============ */
        .numeros-section {
            background: var(--sidebar-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2d3436;
        }

        .numeros-section h3 {
            color: var(--gold);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .ultima-bola-jugador {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .bola-grande {
            background: linear-gradient(135deg, #ff4d4d, #dc2626);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
            animation: pulse 1s infinite;
        }

        .bola-grande .letra {
            font-size: 1.3rem;
            font-weight: 900;
            line-height: 1;
        }

        .bola-grande .numero {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .ultimos-numeros {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .num-chico {
            background: white;
            color: var(--text-dark);
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.75rem;
            border: 2px solid #e2e8f0;
        }

        .num-chico.cantado {
            background: linear-gradient(135deg, #ffca28, #ffb300);
            color: #16213e;
            border-color: #f59e0b;
        }

        .num-chico.vacio {
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            color: #cbd5e1;
        }

        /* ============ CARTONES ============ */
        .cartones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .carton-card {
            background: white;
            color: var(--text-dark);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #e2e8f0;
            position: relative;
        }

        .carton-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .carton-card.seleccionado {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            background: #f0fdf4;
        }

        .carton-card .carton-check {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.3s;
        }

        .carton-card.seleccionado .carton-check {
            background: var(--success);
            color: white;
        }

        .carton-numero {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--red);
            margin-bottom: 8px;
        }

        .carton-tabla {
            width: 100%;
            border-collapse: collapse;
        }

        .carton-tabla th {
            background: #ff4d4d;
            color: white;
            padding: 5px;
            font-size: 0.65rem;
            border: 1px solid #e2e8f0;
        }

        .carton-tabla td {
            padding: 5px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-weight: bold;
            font-size: 0.7rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .carton-tabla td.free {
            background: #fef3c7;
            font-size: 0.8rem;
        }

        .carton-tabla td.marcado {
            background: #10b981 !important;
            color: white !important;
        }

        /* ============ BOTÓN BINGO ============ */
        .btn-bingo-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-bingo {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
            animation: glowBingo 2s infinite;
        }

        .btn-bingo:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(239, 68, 68, 0.6);
        }

        .btn-bingo:disabled {
            background: #6b7280 !important;
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
            box-shadow: none;
        }

        @keyframes glowBingo {
            0%, 100% { box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 4px 35px rgba(239, 68, 68, 0.8); }
        }

        .bingo-info {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        /* ============ MENSAJE DE ESTADO ============ */
        .estado-juego {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .estado-juego.esperando {
            background: #334155;
            color: #94a3b8;
        }

        .estado-juego.jugando {
            background: #10b981;
            color: white;
            animation: pulse 1s infinite;
        }

        .estado-juego.terminado {
            background: #ef4444;
            color: white;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 600px) {
            .cartones-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .bola-grande {
                width: 60px;
                height: 60px;
            }
            
            .bola-grande .numero {
                font-size: 1.5rem;
            }
            
            .btn-bingo {
                padding: 14px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============ HEADER ============ -->
        <div class="header">
            <h1>🎯 BINGO PRO</h1>
            <div class="jugador-nombre" id="jugadorNombre">Cargando...</div>
            <div class="sala-info" id="salaInfo">Sala: -</div>
        </div>

        <!-- ============ ESTADO DEL JUEGO ============ -->
        <div class="estado-juego esperando" id="estadoJuego">
            ⏳ Esperando que inicie el juego...
        </div>

        <!-- ============ ÚLTIMOS NÚMEROS ============ -->
        <div class="numeros-section">
            <h3>📊 NÚMEROS CANTADOS</h3>
            <div class="ultima-bola-jugador">
                <div class="bola-grande" id="ultimaBolaJugador">
                    <span class="letra">-</span>
                    <span class="numero">--</span>
                </div>
                <div style="text-align:center;">
                    <div style="color:#94a3b8;font-size:0.75rem;">Total cantados</div>
                    <div style="font-size:1.5rem;font-weight:900;color:#ffca28;" id="totalCantados">0/75</div>
                </div>
            </div>
            <div class="ultimos-numeros" id="ultimosNumeros">
                <span class="num-chico vacio">--</span>
                <span class="num-chico vacio">--</span>
                <span class="num-chico vacio">--</span>
                <span class="num-chico vacio">--</span>
                <span class="num-chico vacio">--</span>
            </div>
        </div>

        <!-- ============ CARTONES ============ -->
        <div class="cartones-grid" id="cartonesGrid">
            <p style="color:#94a3b8;text-align:center;grid-column:1/-1;padding:40px;">Cargando cartones...</p>
        </div>

        <!-- ============ BOTÓN BINGO ============ -->
        <div class="btn-bingo-container">
            <button class="btn-bingo" id="btnBingo" disabled onclick="cantarBingo()">
                🚨 ¡BINGO!
            </button>
            <div class="bingo-info" id="bingoInfo">
                Selecciona un cartón para cantar BINGO
            </div>
        </div>
    </div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const NOMBRE_JUGADOR = params.get('nombre') || 'Jugador';
        const CARTONES_IDS = params.get('cartones') ? params.get('cartones').split(',') : [];
        const SALA_ID = params.get('sala') || localStorage.getItem('salaActiva') || 'sala-default';

        let cartonesJugador = [];
        let numerosCantados = [];
        let cartonSeleccionado = null;

        console.log('🎮 Jugador:', NOMBRE_JUGADOR);
        console.log('📁 Sala:', SALA_ID);
        console.log('🎫 Cartones:', CARTONES_IDS);

        // ============ INICIALIZAR ============
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('jugadorNombre').textContent = '👤 ' + NOMBRE_JUGADOR;
            document.getElementById('salaInfo').textContent = 'Sala: ' + SALA_ID;
            
            if (CARTONES_IDS.length === 0) {
                document.getElementById('cartonesGrid').innerHTML = 
                    '<p style="color:#ef4444;text-align:center;grid-column:1/-1;padding:40px;">❌ No se encontraron cartones. Verifica el link.</p>';
                return;
            }
            
            cargarCartones();
            escucharNumeros();
        });

        // ============ CARGAR CARTONES ============
        function cargarCartones() {
            db.ref('salas/' + SALA_ID + '/cartones').once('value', function(snap) {
                cartonesJugador = [];
                
                CARTONES_IDS.forEach(function(id) {
                    const carton = snap.child(id).val();
                    if (carton) {
                        cartonesJugador.push(carton);
                    }
                });
                
                if (cartonesJugador.length === 0) {
                    document.getElementById('cartonesGrid').innerHTML = 
                        '<p style="color:#ef4444;text-align:center;grid-column:1/-1;padding:40px;">❌ Cartones no encontrados</p>';
                    return;
                }
                
                mostrarCartones();
            });
        }

        // ============ MOSTRAR CARTONES ============
        function mostrarCartones() {
            const grid = document.getElementById('cartonesGrid');
            grid.innerHTML = '';
            
            cartonesJugador.forEach(function(c, index) {
                const card = document.createElement('div');
                card.className = 'carton-card';
                card.setAttribute('data-index', index);
                
                if (cartonSeleccionado === index) {
                    card.classList.add('seleccionado');
                }
                
                card.onclick = function() {
                    seleccionarCarton(index);
                };
                
                let tablaHTML = '<table class="carton-tabla"><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>';
                
                if (c.carton) {
                    for (let f = 0; f < 5; f++) {
                        tablaHTML += '<tr>';
                        ['B','I','N','G','O'].forEach(function(l) {
                            const valor = c.carton[l][f];
                            const centro = (l === 'N' && f === 2);
                            const cantado = numerosCantados.includes(valor);
                            tablaHTML += '<td class="' + (centro ? 'free' : '') + (cantado ? ' marcado' : '') + '">' + (centro ? '⭐' : valor) + '</td>';
                        });
                        tablaHTML += '</tr>';
                    }
                }
                
                tablaHTML += '</table>';
                
                card.innerHTML = 
                    '<div class="carton-check">' + (cartonSeleccionado === index ? '✓' : '') + '</div>' +
                    '<div class="carton-numero">Cartón #' + (c.numero || (index + 1)) + '</div>' +
                    tablaHTML;
                
                grid.appendChild(card);
            });
            
            actualizarBotonBingo();
        }

        // ============ SELECCIONAR CARTÓN ============
        function seleccionarCarton(index) {
            if (cartonSeleccionado === index) {
                cartonSeleccionado = null;
            } else {
                cartonSeleccionado = index;
            }
            mostrarCartones();
        }

        // ============ ACTUALIZAR BOTÓN BINGO ============
        function actualizarBotonBingo() {
            const btn = document.getElementById('btnBingo');
            const info = document.getElementById('bingoInfo');
            
            if (cartonSeleccionado !== null) {
                btn.disabled = false;
                const c = cartonesJugador[cartonSeleccionado];
                info.textContent = 'Cartón #' + (c.numero || (cartonSeleccionado + 1)) + ' seleccionado - ¡Listo para cantar BINGO!';
                info.style.color = '#10b981';
            } else {
                btn.disabled = true;
                info.textContent = 'Selecciona un cartón para cantar BINGO';
                info.style.color = '#94a3b8';
            }
        }

        // ============ CANTAR BINGO ============
        function cantarBingo() {
            if (cartonSeleccionado === null) {
                alert('Selecciona un cartón primero');
                return;
            }
            
            const carton = cartonesJugador[cartonSeleccionado];
            
            if (confirm('¿Estás seguro de cantar BINGO con el Cartón #' + (carton.numero || '?') + '?')) {
                db.ref('bingos/' + SALA_ID).push({
                    jugador: NOMBRE_JUGADOR,
                    cartonId: carton.id,
                    cartonNumero: carton.numero,
                    timestamp: Date.now()
                }).then(function() {
                    alert('✅ ¡BINGO cantado! Espera la verificación del administrador.');
                    document.getElementById('btnBingo').disabled = true;
                    document.getElementById('btnBingo').textContent = '✅ BINGO CANTADO';
                    document.getElementById('btnBingo').style.background = '#10b981';
                }).catch(function(error) {
                    console.error('Error:', error);
                    alert('❌ Error al cantar BINGO. Intenta de nuevo.');
                });
            }
        }

        // ============ ESCUCHAR NÚMEROS ============
        function escucharNumeros() {
            db.ref('partidas/' + SALA_ID).on('value', function(snap) {
                const data = snap.val();
                
                if (data) {
                    // Actualizar estado
                    const estadoEl = document.getElementById('estadoJuego');
                    if (data.estado === 'jugando' || data.estado === 'iniciando') {
                        estadoEl.className = 'estado-juego jugando';
                        estadoEl.textContent = '▶️ Juego en progreso';
                    } else if (data.estado === 'terminado') {
                        estadoEl.className = 'estado-juego terminado';
                        estadoEl.textContent = '🏁 Juego terminado' + (data.ganador ? ' - Ganador: ' + data.ganador : '');
                    }
                    
                    // Actualizar números cantados
                    if (data.cantados && data.cantados.length > 0) {
                        numerosCantados = data.cantados;
                        actualizarDisplayNumeros(data);
                        mostrarCartones();
                    }
                }
            });
        }

        // ============ ACTUALIZAR DISPLAY DE NÚMEROS ============
        function actualizarDisplayNumeros(data) {
            // Última bola
            if (data.ultimaBola) {
                const contenedor = document.getElementById('ultimaBolaJugador');
                contenedor.querySelector('.letra').textContent = obtenerLetra(data.ultimaBola);
                contenedor.querySelector('.numero').textContent = data.ultimaBola;
            }
            
            // Total cantados
            document.getElementById('totalCantados').textContent = numerosCantados.length + '/75';
            
            // Últimos 5
            const ultimosContainer = document.getElementById('ultimosNumeros');
            ultimosContainer.innerHTML = '';
            const ultimos = numerosCantados.slice(-5).reverse();
            
            for (let i = 0; i < 5; i++) {
                const span = document.createElement('span');
                if (i < ultimos.length) {
                    span.className = 'num-chico cantado';
                    span.textContent = obtenerLetra(ultimos[i]) + '-' + ultimos[i];
                } else {
                    span.className = 'num-chico vacio';
                    span.textContent = '--';
                }
                ultimosContainer.appendChild(span);
            }
        }

        function obtenerLetra(numero) {
            if (numero <= 15) return 'B';
            if (numero <= 30) return 'I';
            if (numero <= 45) return 'N';
            if (numero <= 60) return 'G';
            return 'O';
        }
    </script>
</body>
</html>
