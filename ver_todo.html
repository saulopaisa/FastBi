<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Ver Todos los Cartones</title>
    <style>
        :root {
            --bg-dark: #0b0f1a;
            --sidebar-bg: #16213e;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --text-dark: #1e293b;
            --red: #ff4d4d;
            --gold: #ffb703;
            --success: #10b981;
            --blue: #3b82f6;
            --purple: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(180deg, var(--sidebar-bg), #0f172a);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #2d3436;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            color: var(--red);
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-header {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            color: white;
        }

        .btn-header:hover {
            transform: translateY(-2px);
        }

        .btn-volver {
            background: linear-gradient(135deg, var(--blue), #2563eb);
        }

        /* ============ ESTADÍSTICAS ============ */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--sidebar-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2d3436;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--gold);
        }

        .stat-card.activo {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 183, 3, 0.3);
        }

        .stat-card .stat-numero {
            font-size: 2rem;
            font-weight: 900;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 5px;
        }

        .stat-card:nth-child(1) .stat-numero { color: #3b82f6; }
        .stat-card:nth-child(2) .stat-numero { color: #10b981; }
        .stat-card:nth-child(3) .stat-numero { color: var(--gold); }
        .stat-card:nth-child(4) .stat-numero { color: #ef4444; }

        /* ============ FILTROS ============ */
        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filtros input,
        .filtros select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #2d3748;
            background: #1e293b;
            color: white;
            font-size: 0.85rem;
        }

        .filtros input {
            flex: 1;
            min-width: 200px;
        }

        .filtros input::placeholder {
            color: #64748b;
        }

        .filtros select {
            cursor: pointer;
        }

        .filtros input:focus,
        .filtros select:focus {
            outline: none;
            border-color: var(--blue);
        }

        .btn-filtro {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            color: white;
        }

        .btn-exportar {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .btn-exportar:hover {
            transform: translateY(-2px);
        }

        /* ============ GRID DE CARTONES ============ */
        .cartones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .carton-card {
            background: white;
            color: var(--text-dark);
            border-radius: 12px;
            padding: 15px;
            border-left: 5px solid var(--blue);
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        .carton-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .carton-card.asignado {
            border-left-color: var(--gold);
        }

        .carton-card.usado {
            border-left-color: #ef4444;
            opacity: 0.7;
        }

        .carton-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .carton-numero {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--red);
        }

        .carton-estado {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .carton-estado:hover {
            transform: scale(1.1);
        }

        .estado-disponible {
            background: #dcfce7;
            color: #166534;
        }

        .estado-asignado {
            background: #fef3c7;
            color: #92400e;
        }

        .estado-usado {
            background: #fee2e2;
            color: #991b1b;
        }

        .carton-jugador {
            font-size: 0.8rem;
            color: var(--success);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .carton-tabla {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .carton-tabla th {
            background: #ff4d4d;
            color: white;
            padding: 6px;
            font-size: 0.7rem;
            border: 1px solid #e2e8f0;
        }

        .carton-tabla td {
            padding: 6px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .carton-tabla td.free {
            background: #fef3c7;
            font-size: 0.9rem;
        }

        .carton-id {
            font-size: 0.6rem;
            color: #94a3b8;
            margin-top: 5px;
            word-break: break-all;
        }

        .btn-copiar-link {
            display: block;
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-copiar-link:hover {
            background: #2563eb;
        }

        .btn-copiar-link.copiado {
            background: #10b981;
        }

        .btn-link-jugador {
            display: block;
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .btn-link-jugador:hover {
            background: #7c3aed;
        }

        .sin-cartones {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .sin-cartones .icono {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .header-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn-header {
                width: 100%;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .cartones-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- ============ HEADER ============ -->
    <div class="header">
        <h1>🎯 BINGO PRO - Todos los Cartones</h1>
        <div class="header-buttons">
            <button class="btn-header btn-volver" onclick="location.href='generar.html'">
                📝 VOLVER A GENERAR
            </button>
        </div>
    </div>

    <!-- ============ ESTADÍSTICAS (CLICKABLES) ============ -->
    <div class="stats-container" id="statsContainer">
        <div class="stat-card" onclick="filtrarPorEstado('todos')" id="statTotalCard">
            <div class="stat-numero" id="statTotal">0</div>
            <div class="stat-label">Total Cartones</div>
        </div>
        <div class="stat-card" onclick="filtrarPorEstado('disponible')" id="statDisponibleCard">
            <div class="stat-numero" id="statDisponibles">0</div>
            <div class="stat-label">🟢 Disponibles</div>
        </div>
        <div class="stat-card" onclick="filtrarPorEstado('asignado')" id="statAsignadoCard">
            <div class="stat-numero" id="statAsignados">0</div>
            <div class="stat-label">🟡 Asignados</div>
        </div>
        <div class="stat-card" onclick="filtrarPorEstado('usado')" id="statUsadoCard">
            <div class="stat-numero" id="statUsados">0</div>
            <div class="stat-label">🔴 Usados</div>
        </div>
    </div>

    <!-- ============ FILTROS ============ -->
    <div class="filtros">
        <input type="text" id="buscarCarton" placeholder="🔍 Buscar por nombre, jugador o número..." oninput="filtrarCartones()">
        <select id="filtroEstado" onchange="filtrarCartones()">
            <option value="todos">Todos los estados</option>
            <option value="disponible">🟢 Disponibles</option>
            <option value="asignado">🟡 Asignados</option>
            <option value="usado">🔴 Usados</option>
        </select>
        <button class="btn-filtro btn-exportar" onclick="exportarPDFTodos()">
            📄 EXPORTAR PDF
        </button>
    </div>

    <!-- ============ GRID DE CARTONES ============ -->
    <div class="cartones-grid" id="cartonesGrid">
        <div class="sin-cartones">
            <div class="icono">🎫</div>
            <p>Cargando cartones...</p>
        </div>
    </div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const SALA_ID = localStorage.getItem('salaActiva') || 'sala-default';
        let todosLosCartones = [];
        
        console.log('📁 Sala:', SALA_ID);
        
        // ============ CARGAR CARTONES ============
        function cargarCartones() {
            db.ref('salas/' + SALA_ID + '/cartones').once('value', function(snap) {
                todosLosCartones = [];
                
                if (!snap.exists()) {
                    document.getElementById('cartonesGrid').innerHTML = 
                        '<div class="sin-cartones"><div class="icono">📋</div><p>No hay cartones generados en esta sala</p><p style="font-size:0.9rem;">Ve a Generar Cartones para crear algunos</p></div>';
                    actualizarStats();
                    return;
                }
                
                snap.forEach(function(child) {
                    todosLosCartones.push({ key: child.key, ...child.val() });
                });
                
                todosLosCartones.sort((a, b) => (a.numero || 0) - (b.numero || 0));
                
                actualizarStats();
                mostrarCartones(todosLosCartones);
            });
        }
        
        // ============ ACTUALIZAR ESTADÍSTICAS ============
        function actualizarStats() {
            const total = todosLosCartones.length;
            const disponibles = todosLosCartones.filter(c => c.estado === 'disponible').length;
            const asignados = todosLosCartones.filter(c => c.estado === 'asignado').length;
            const usados = todosLosCartones.filter(c => c.estado === 'usado').length;
            const jugadoresUnicos = new Set(todosLosCartones.filter(c => c.asignadoA).map(c => c.asignadoA)).size;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statDisponibles').textContent = disponibles;
            document.getElementById('statAsignados').textContent = asignados;
            document.getElementById('statUsados').textContent = usados;
        }
        
        // ============ FILTRAR POR ESTADO (CLICK EN STATS) ============
        function filtrarPorEstado(estado) {
            document.getElementById('filtroEstado').value = estado;
            
            // Marcar stat activo
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('activo'));
            if (estado === 'todos') document.getElementById('statTotalCard').classList.add('activo');
            else if (estado === 'disponible') document.getElementById('statDisponibleCard').classList.add('activo');
            else if (estado === 'asignado') document.getElementById('statAsignadoCard').classList.add('activo');
            else if (estado === 'usado') document.getElementById('statUsadoCard').classList.add('activo');
            
            filtrarCartones();
        }
        
        // ============ GENERAR LINK CIFRADO ============
        function generarLinkCifrado(nombre, ids) {
            const base = location.origin + location.pathname.replace('ver_todo.html', '');
            const datos = { n: nombre, c: ids, s: SALA_ID, t: Date.now() };
            return base + 'jugador.html?d=' + btoa(encodeURIComponent(JSON.stringify(datos)));
        }
        
        // ============ COPIAR LINK INDIVIDUAL ============
        function copiarLinkCarton(id, btn) {
            const link = generarLinkCifrado('Cartón individual', [id]);
            navigator.clipboard.writeText(link).then(function() {
                btn.textContent = '✅ COPIADO!';
                btn.classList.add('copiado');
                setTimeout(function() {
                    btn.textContent = '🔗 COPIAR LINK';
                    btn.classList.remove('copiado');
                }, 2000);
            });
        }
        
        // ============ COPIAR LINK DE JUGADOR ============
        function copiarLinkJugador(nombre, ids, btn) {
            const link = generarLinkCifrado(nombre, ids);
            navigator.clipboard.writeText(link).then(function() {
                btn.textContent = '✅ LINK DE ' + nombre.toUpperCase() + ' COPIADO!';
                btn.style.background = '#10b981';
                setTimeout(function() {
                    btn.textContent = '👤 LINK DE ' + nombre.toUpperCase();
                    btn.style.background = '#8b5cf6';
                }, 2000);
            });
        }
        
        // ============ MOSTRAR CARTONES ============
        function mostrarCartones(cartones) {
            const grid = document.getElementById('cartonesGrid');
            
            if (cartones.length === 0) {
                grid.innerHTML = '<div class="sin-cartones"><div class="icono">🔍</div><p>No se encontraron cartones con ese filtro</p></div>';
                return;
            }
            
            grid.innerHTML = '';
            
            // Agrupar por jugador para mostrar link
            const jugadores = {};
            cartones.forEach(function(c) {
                if (c.asignadoA) {
                    if (!jugadores[c.asignadoA]) jugadores[c.asignadoA] = [];
                    jugadores[c.asignadoA].push(c.id || c.key);
                }
            });
            
            cartones.forEach(function(c) {
                const card = document.createElement('div');
                card.className = 'carton-card ' + (c.estado === 'asignado' ? 'asignado' : '') + (c.estado === 'usado' ? 'usado' : '');
                
                let tablaHTML = '<table class="carton-tabla"><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>';
                
                if (c.carton) {
                    for (let f = 0; f < 5; f++) {
                        tablaHTML += '<tr>';
                        ['B','I','N','G','O'].forEach(function(l) {
                            const valor = c.carton[l][f];
                            const centro = (l === 'N' && f === 2);
                            tablaHTML += '<td class="' + (centro ? 'free' : '') + '">' + (centro ? '⭐' : valor) + '</td>';
                        });
                        tablaHTML += '</tr>';
                    }
                } else {
                    tablaHTML += '<tr><td colspan="5">Sin datos</td></tr>';
                }
                
                tablaHTML += '</table>';
                
                const idCarton = c.id || c.key || '';
                const nombreJugador = c.asignadoA || '';
                const idsJugador = nombreJugador ? jugadores[nombreJugador] : [];
                
                card.innerHTML = 
                    '<div class="carton-header">' +
                    '<span class="carton-numero"># ' + (c.numero || '?') + '</span>' +
                    '<span class="carton-estado estado-' + (c.estado || 'disponible') + '" onclick="filtrarPorEstado(\'' + (c.estado || 'disponible') + '\')">' + (c.estado || 'disponible') + '</span>' +
                    '</div>' +
                    (nombreJugador ? '<div class="carton-jugador">👤 ' + nombreJugador + '</div>' : '') +
                    (c.nombre && c.nombre !== 'Cartón ' + c.numero ? '<div style="font-size:0.8rem;color:#64748b;margin-bottom:5px;">' + c.nombre + '</div>' : '') +
                    tablaHTML +
                    '<button class="btn-copiar-link" onclick="copiarLinkCarton(\'' + idCarton + '\', this)">🔗 COPIAR LINK INDIVIDUAL</button>' +
                    (nombreJugador && idsJugador.length > 0 ? '<button class="btn-link-jugador" onclick="copiarLinkJugador(\'' + nombreJugador.replace(/'/g, "\\'") + '\', ' + JSON.stringify(idsJugador) + ', this)">👤 LINK DE ' + nombreJugador.toUpperCase() + '</button>' : '') +
                    '<div class="carton-id">ID: ' + idCarton + '</div>';
                
                grid.appendChild(card);
            });
        }
        
        // ============ FILTRAR ============
        function filtrarCartones() {
            const busqueda = document.getElementById('buscarCarton').value.toLowerCase();
            const estado = document.getElementById('filtroEstado').value;
            
            // Actualizar stats activos
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('activo'));
            if (estado === 'todos') document.getElementById('statTotalCard').classList.add('activo');
            else if (estado === 'disponible') document.getElementById('statDisponibleCard').classList.add('activo');
            else if (estado === 'asignado') document.getElementById('statAsignadoCard').classList.add('activo');
            else if (estado === 'usado') document.getElementById('statUsadoCard').classList.add('activo');
            
            const filtrados = todosLosCartones.filter(function(c) {
                const matchBusqueda = !busqueda || 
                    (c.nombre || '').toLowerCase().includes(busqueda) ||
                    (c.asignadoA || '').toLowerCase().includes(busqueda) ||
                    String(c.numero || '').includes(busqueda) ||
                    (c.id || '').toLowerCase().includes(busqueda);
                
                const matchEstado = estado === 'todos' || c.estado === estado;
                
                return matchBusqueda && matchEstado;
            });
            
            mostrarCartones(filtrados);
        }
        
        // ============ EXPORTAR PDF ============
        function exportarPDFTodos() {
            if (todosLosCartones.length === 0) {
                alert('No hay cartones para exportar');
                return;
            }
            
            const ventana = window.open('', '_blank', 'width=800,height=600');
            ventana.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PDF Cartones</title>');
            ventana.document.write('<style>');
            ventana.document.write('*{margin:0;padding:0}body{font-family:Arial;background:white}.pagina{width:750px;padding:15px;page-break-after:always;min-height:100vh}.pagina:last-child{page-break-after:avoid}h1{text-align:center;color:#ff4d4d;font-size:18px}h2{text-align:center;font-size:14px}.carton{border:2px solid #000;border-radius:8px;padding:10px;margin-bottom:15px}table{width:100%;border-collapse:collapse}th{background:#ff4d4d;color:white;padding:8px;border:1px solid #000}td{padding:8px;border:1px solid #000;text-align:center;font-weight:bold}.free{background:#fef3c7}.num-carton{text-align:center;margin-bottom:5px}.num-carton span{background:#ff4d4d;color:white;padding:3px 12px;border-radius:10px;font-size:12px;font-weight:bold}.jugador{text-align:center;color:#10b981;font-size:12px;font-weight:bold}');
            ventana.document.write('</style></head><body>');
            
            for (let i = 0; i < todosLosCartones.length; i += 2) {
                ventana.document.write('<div class="pagina"><h1>🎯 BINGO PRO</h1><h2>Todos los Cartones</h2>');
                ventana.document.write('<p style="text-align:center;font-size:10px;">Pág. ' + (Math.floor(i/2)+1) + ' | ' + todosLosCartones.length + ' cartones</p>');
                ventana.document.write(generarHTMLCartonPDF(todosLosCartones[i]));
                if (i+1 < todosLosCartones.length) ventana.document.write(generarHTMLCartonPDF(todosLosCartones[i+1]));
                ventana.document.write('</div>');
            }
            ventana.document.write('<script>window.onload=function(){setTimeout(window.print,800)};<\/script></body></html>');
            ventana.document.close();
        }
        
        function generarHTMLCartonPDF(c) {
            if (!c || !c.carton) return '<div class="carton"><p>Error</p></div>';
            let html = '<div class="carton"><div class="num-carton"><span>Cartón #' + (c.numero||'?') + '</span></div>';
            if (c.asignadoA) html += '<p class="jugador">👤 ' + c.asignadoA + '</p>';
            html += '<table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>';
            for (let f = 0; f < 5; f++) { html += '<tr>'; ['B','I','N','G','O'].forEach(function(l) { const v = c.carton[l][f], centro = (l==='N'&&f===2); html += '<td class="'+(centro?'free':'')+'">'+(centro?'⭐':v)+'</td>'; }); html += '</tr>'; }
            html += '</table></div>';
            return html;
        }
        
        // ============ INICIAR ============
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📋 Vista de cartones iniciada');
            cargarCartones();
        });
    </script>
</body>
</html>
