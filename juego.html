<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Juego en Vivo</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* --- 1. BARRA SUPERIOR DISCRETA --- */
        .historial-fijo {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #1d3557; display: flex; align-items: center;
            gap: 6px; padding: 5px 10px; z-index: 10000;
            border-bottom: 2px solid #ffb703; overflow-x: auto;
            height: 50px; scrollbar-width: none;
        }
        .historial-fijo::-webkit-scrollbar { display: none; }

        .bola-historial {
            background: #e63946; color: white; min-width: 38px; height: 38px;
            border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 900;
            border: 1px solid white; flex-shrink: 0; font-size: 0.8rem;
        }

        /* --- 2. MINI-MAPA DEL PATRÓN (FORMA DE GANAR) --- */
        .contenedor-patron {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 10px;
            margin: 10px auto; width: fit-content;
            text-align: center; border: 1px solid #475569;
        }
        .grid-patron {
            display: grid; grid-template-columns: repeat(5, 12px);
            gap: 3px; justify-content: center; margin-top: 5px;
        }
        .celda-patron {
            width: 12px; height: 12px; border-radius: 2px; background: #334155;
        }
        .celda-patron.activa { background: #ffb703; box-shadow: 0 0 5px #ffb703; }

        /* --- 3. ESTILOS GENERALES --- */
        body { 
            margin: 0; background-color: #0f172a !important; 
            color: white; font-family: sans-serif; padding-top: 60px; 
        }

        .cartones-grid { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 10px; }
        .bingo-card { width: 95% !important; max-width: 380px !important; margin: 0 auto; }
        
        /* Panel invisible para mantener juego.js funcionando */
        #panelConfigAdmin { display: none; }

        .logo-bingo { color: #ffb703; text-align: center; font-size: 1.2rem; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="barraHistorial" class="historial-fijo">
        <div id="msgEspera" style="color: #64748b; font-size: 0.7rem; width:100%; text-align:center;">Esperando inicio del sorteo...</div>
    </div>

    <div class="contenedor-patron">
        <small style="color: #94a3b8; font-weight: bold; font-size: 0.65rem;">FORMA DE GANAR:</small>
        <div id="gridPatron" class="grid-patron">
            </div>
    </div>

    <div id="panelConfigAdmin">
        <input type="number" id="id1"> <input type="number" id="id2">
        <input type="number" id="id3"> <input type="number" id="id4">
        <button id="btnGenerar"></button>
    </div>

    <div class="juego-container">
        <h1 class="logo-bingo">BINGO DIGITAL</h1>
        <p style="text-align:center; color: #ef4444; font-size: 0.7rem; font-weight: bold;">⚠️ ATENCIÓN: No habrá ayuda visual. ¡Marca tus números!</p>

        <div id="contenedorCartones" class="cartones-grid"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let historialLocal = [];

        // --- ESCUCHAR PARTIDA (NÚMEROS Y REINICIO) ---
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            
            // Lógica de Reinicio
            if (data && data.status === "reiniciado") {
                reiniciarPantallaJugador();
                return;
            }

            if (data && data.numero) {
                actualizarHistorialSuperior(data.letra, data.numero);
                // LA AYUDA VISUAL HA SIDO ELIMINADA (resaltarEnCarton ya no se llama)
            }
        });

        // --- ESCUCHAR PATRÓN (FORMA DE GANAR) ---
        db.ref('configuracion/patron').on('value', (snapshot) => {
            const patron = snapshot.val();
            dibujarPatronGuia(patron);
        });

        function actualizarHistorialSuperior(letra, numero) {
            if (historialLocal.includes(numero)) return;
            historialLocal.unshift(numero);
            const barra = document.getElementById('barraHistorial');
            if (historialLocal.length === 1) barra.innerHTML = '';
            
            const bola = document.createElement('div');
            bola.className = 'bola-historial';
            bola.innerHTML = `<small>${letra}</small><span>${numero}</span>`;
            barra.prepend(bola);
            barra.scrollLeft = 0;
        }

        function dibujarPatronGuia(patron) {
            const grid = document.getElementById('gridPatron');
            grid.innerHTML = '';
            // Si no hay patrón, asumimos cartón lleno o vacío
            const p = patron || Array(25).fill(false);
            
            p.forEach((activo, index) => {
                const celda = document.createElement('div');
                celda.className = `celda-patron ${activo ? 'activa' : ''}`;
                grid.appendChild(celda);
            });
        }

        function reiniciarPantallaJugador() {
            historialLocal = [];
            document.getElementById('barraHistorial').innerHTML = '<div style="color: #64748b; font-size: 0.7rem; width:100%; text-align:center;">Nueva partida iniciada. ¡Buena suerte!</div>';
            
            // Opcional: Limpiar marcas del cartón (Si quieres que el jugador empiece de cero total)
            // localStorage.clear(); 
            // location.reload();

            alert("🔔 ¡EL ADMINISTRADOR HA REINICIADO LA PARTIDA! Los números anteriores ya no valen.");
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            if (p) {
                document.getElementById('id1').value = p; 
                document.getElementById('btnGenerar').click();
            }
        };
    </script>

    <script src="juego.js"></script>
</body>
</html>
