<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo - Juego en Vivo</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* --- ESTILOS DE LA BARRA HORIZONTAL SUPERIOR --- */
        .historial-fijo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #1d3557;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            padding: 10px;
            z-index: 9999;
            border-bottom: 3px solid #ffb703;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            overflow-x: auto; /* Permite deslizar si hay muchos números */
            white-space: nowrap;
            min-height: 60px;
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }

        .historial-fijo::-webkit-scrollbar {
            display: none; /* Oculta scroll en Chrome/Safari */
        }

        .bola-historial {
            background: #e63946;
            color: white;
            min-width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            border: 2px solid white;
            flex-shrink: 0; /* Evita que se aplasten */
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .bola-historial small {
            font-size: 0.55rem;
            line-height: 1;
            margin-bottom: -2px;
            opacity: 0.9;
        }

        .bola-nueva {
            border-color: #ffb703;
            box-shadow: 0 0 15px #ffb703;
            transform: scale(1.1);
        }

        /* Ajuste para que el cartón no quede debajo de la barra */
        body {
            padding-top: 85px !important; 
            margin: 0;
            background-color: #f1faee;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .indicador-vacio {
            color: #a8dadc;
            font-size: 0.8rem;
            font-style: italic;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="barraHistorial" class="historial-fijo">
        <div class="indicador-vacio">Esperando primer número...</div>
    </div>

    <div class="juego-container">
        <header class="juego-header">
            <h1 class="logo-bingo">BINGO DIGITAL</h1>
            <p>Toca los números para marcarlos</p>
        </header>

        <div id="contenedorCartones" class="cartones-grid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let historialLocal = [];

        // ESCUCHA EN TIEMPO REAL
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.numero) {
                actualizarHistorialSuperior(data.letra, data.numero);
                resaltarEnCarton(data.numero);
            }
        });

        function actualizarHistorialSuperior(letra, numero) {
            // Evitar duplicar el último número si la página se refresca
            if (historialLocal[0] === numero) return;
            
            historialLocal.unshift(numero); // Agregamos al inicio del array

            const barra = document.getElementById('barraHistorial');
            
            // Limpiar el texto de "Esperando..." en la primera bola
            if (historialLocal.length === 1) barra.innerHTML = '';

            // Crear la bola
            const bola = document.createElement('div');
            bola.className = 'bola-historial bola-nueva';
            bola.innerHTML = `<small>${letra}</small><span>${numero}</span>`;

            // Quitar el brillo de "bola-nueva" a la bola anterior
            const anterior = barra.querySelector('.bola-nueva');
            if (anterior) anterior.classList.remove('bola-nueva');

            // Insertar al principio (izquierda)
            barra.prepend(bola);

            // Auto-scroll al inicio para ver la bola nueva
            barra.scrollLeft = 0;

            if (navigator.vibrate) navigator.vibrate(150);
        }

        function resaltarEnCarton(numero) {
            const celdas = document.querySelectorAll('.cell');
            celdas.forEach(celda => {
                if (parseInt(celda.innerText) === numero) {
                    celda.style.boxShadow = "0 0 15px #ffb703";
                    celda.style.border = "3px solid #ffb703";
                    celda.style.transition = "all 0.3s ease";
                }
            });
        }
    </script>

    <script src="juego.js"></script>

</body>
</html>
