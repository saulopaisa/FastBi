<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo - Juego en Vivo</title>
    <style>
        :root {
            --primary-blue: #1d3557;
            --accent-gold: #ffb703;
            --accent-red: #e63946;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-blue);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-gold);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- CONTENEDOR HORIZONTAL --- */
        #cartones-container {
            display: flex;
            flex-direction: row; /* Alineación horizontal */
            flex-wrap: wrap;     /* Si no caben, bajan a la siguiente fila */
            gap: 25px;
            justify-content: center;
            width: 100%;
            max-width: 1200px; /* Permitimos que se estire más en PC/Tablet */
        }

        /* Estilo del Cartón ajustado para ser más compacto */
        .carton-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 4px solid var(--accent-gold);
            /* Ancho fijo para que puedan ponerse uno al lado del otro */
            width: 100%;
            max-width: 350px; 
            animation: slideUp 0.4s ease-out;
        }

        .info-jugador {
            background: var(--primary-blue);
            padding: 8px;
            text-align: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        .info-jugador .nombre {
            display: block;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent-gold);
        }

        .info-jugador .id-txt {
            font-size: 0.7rem;
            color: #cbd5e1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            user-select: none;
        }

        th {
            background: var(--accent-red);
            color: white;
            font-size: 1.2rem;
            padding: 8px 0;
            width: 20%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        td {
            height: 55px; /* Altura reducida para que quepan mejor */
            text-align: center;
            vertical-align: middle;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary-blue);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        td.marcada {
            background-color: var(--accent-gold);
            color: var(--primary-blue);
            transform: scale(0.9);
            border-radius: 12px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
        }

        td.free {
            background-color: var(--primary-blue);
            color: var(--accent-gold);
            font-size: 1.5rem;
        }

        .error-box {
            background: var(--accent-red);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 50px;
        }

        /* Ajuste para pantallas pequeñas */
        @media (max-width: 400px) {
            .carton-card {
                max-width: 100%; /* En móviles muy pequeños vuelve a ocupar todo el ancho */
            }
            td {
                height: 50px;
                font-size: 1.2rem;
            }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BINGO DIGITAL</h1>
        <p style="margin: 5px 0; font-size: 0.9rem; opacity: 0.8;">Toca los números para marcarlos</p>
    </div>

    <div id="cartones-container">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const dataEncoded = params.get('p');
        const container = document.getElementById('cartones-container');

        if (!dataEncoded) {
            container.innerHTML = `<div class="error-box"><h3>⚠️ Enlace no válido</h3><p>Pide un nuevo link a tu administrador.</p></div>`;
        } else {
            try {
                const jsonStr = atob(dataEncoded);
                const listaCartones = JSON.parse(jsonStr);

                listaCartones.forEach(obj => {
                    const matriz = generarMatrizFija(obj.id);
                    renderizarCarton(obj.id, obj.nombre, matriz);
                });
            } catch (e) {
                container.innerHTML = `<div class="error-box"><h3>⚠️ Error de lectura</h3><p>El enlace es incorrecto.</p></div>`;
            }
        }

        function generarMatrizFija(id) {
            let seed = parseInt(id);
            const rangos = [[1,15],[16,30],[31,45],[46,60],[61,75]];
            
            const columnas = rangos.map(r => {
                let n = []; 
                for(let i=r[0]; i<=r[1]; i++) n.push(i);
                
                // Shuffle determinista
                let m = n.length, t, i;
                while (m) {
                    i = Math.floor(Math.abs(Math.sin(seed++)) * m--);
                    t = n[m]; n[m] = n[i]; n[i] = t;
                }
                return n.slice(0, 5).sort((a,b) => a-b);
            });

            let filas = [];
            for(let f=0; f<5; f++) {
                let fila = [];
                for(let c=0; c<5; c++) {
                    fila.push((f === 2 && c === 2) ? "FREE" : columnas[c][f]);
                }
                filas.push(fila);
            }
            return filas;
        }

        function renderizarCarton(id, nombre, matriz) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'carton-card';

            let tableHTML = `
                <div class="info-jugador">
                    <span class="nombre">${nombre.toUpperCase()}</span>
                    <span class="id-txt">№ ${id.toString().padStart(3, '0')}</span>
                </div>
                <table>
                    <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
            `;

            matriz.forEach(fila => {
                tableHTML += `<tr>`;
                fila.forEach(celda => {
                    if (celda === "FREE") {
                        tableHTML += `<td class="free marcada">★</td>`;
                    } else {
                        tableHTML += `<td onclick="marcarCasilla(this)">${celda}</td>`;
                    }
                });
                tableHTML += `</tr>`;
            });

            tableHTML += `</table>`;
            cardDiv.innerHTML = tableHTML;
            container.appendChild(cardDiv);
        }

        function marcarCasilla(elemento) {
            elemento.classList.toggle('marcada');
        }
    </script>
</body>
</html>
