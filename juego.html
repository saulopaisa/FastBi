<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo - Juego en Vivo</title>
    <style>
        :root {
            --primary-blue: #1d3557;
            --accent-gold: #ffb703;
            --accent-red: #e63946;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-blue);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-gold);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #cartones-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        .carton-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 4px solid var(--accent-gold);
            width: 100%;
            max-width: 350px;
            animation: slideUp 0.4s ease-out;
        }

        .info-jugador {
            background: var(--primary-blue);
            padding: 8px;
            text-align: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        .info-jugador .nombre {
            display: block;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent-gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            user-select: none;
        }

        th {
            background: var(--accent-red);
            color: white;
            font-size: 1.2rem;
            padding: 8px 0;
            width: 20%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        td {
            height: 55px;
            text-align: center;
            vertical-align: middle;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary-blue);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        td.marcada {
            background-color: var(--accent-gold) !important;
            color: var(--primary-blue) !important;
            transform: scale(0.9);
            border-radius: 12px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
        }

        td.free {
            background-color: var(--primary-blue);
            color: var(--accent-gold);
            font-size: 1.5rem;
        }

        /* Notificación Flotante */
        #bingo-alert-live {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BINGO DIGITAL</h1>
        <p style="margin: 5px 0; font-size: 0.9rem; opacity: 0.8;">Toca los números para marcarlos</p>
    </div>

    <div id="bingo-alert-live"></div>

    <div id="cartones-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // 1. CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. LÓGICA DE CARTONES
        const params = new URLSearchParams(window.location.search);
        const dataEncoded = params.get('p');
        const container = document.getElementById('cartones-container');

        if (!dataEncoded) {
            container.innerHTML = `<div style="background:var(--accent-red); padding:20px; border-radius:10px; text-align:center; margin-top:50px;"><h3>⚠️ Enlace no válido</h3><p>Pide un nuevo link a tu administrador.</p></div>`;
        } else {
            try {
                const listaCartones = JSON.parse(atob(dataEncoded));
                listaCartones.forEach(obj => {
                    const matriz = generarMatrizSincronizada(obj.id);
                    renderizarCarton(obj.id, obj.nombre, matriz);
                });
            } catch (e) {
                container.innerHTML = `<div style="background:var(--accent-red); padding:20px; border-radius:10px; text-align:center; margin-top:50px;"><h3>⚠️ Error de lectura</h3><p>El enlace es incorrecto.</p></div>`;
            }
        }

        function generarMatrizSincronizada(id) {
            const seedBase = parseInt(id);
            const rangos = [[1,15],[16,30],[31,45],[46,60],[61,75]];
            const columnas = rangos.map((r, indexCol) => {
                let n = []; for(let i=r[0]; i<=r[1]; i++) n.push(i);
                return shuffleDeterminista([...n], seedBase + indexCol).slice(0, 5);
            });
            let matrizFilas = [];
            for(let f=0; f<5; f++) {
                let fila = [];
                for(let c=0; c<5; c++) fila.push((f === 2 && c === 2) ? "FREE" : columnas[c][f]);
                matrizFilas.push(fila);
            }
            return matrizFilas;
        }

        function shuffleDeterminista(array, seed) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.abs(Math.sin(seed++)) * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        function renderizarCarton(id, nombre, matriz) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'carton-card';
            let tableHTML = `<div class="info-jugador"><span class="nombre">${nombre.toUpperCase()}</span><span style="font-size:0.7rem; color:#cbd5e1;">№ ${id.toString().padStart(3, '0')}</span></div><table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
            matriz.forEach((fila) => {
                tableHTML += `<tr>`;
                fila.forEach((celda) => {
                    if (celda === "FREE") {
                        tableHTML += `<td class="free marcada">★</td>`;
                    } else {
                        const isMarked = localStorage.getItem(`mark_${id}_${celda}`) ? 'marcada' : '';
                        tableHTML += `<td class="${isMarked}" onclick="marcarCasilla(this, '${id}', '${celda}')">${celda}</td>`;
                    }
                });
                tableHTML += `</tr>`;
            });
            tableHTML += `</table>`;
            cardDiv.innerHTML = tableHTML;
            container.appendChild(cardDiv);
        }

        function marcarCasilla(elemento, id, numero) {
            elemento.classList.toggle('marcada');
            if (elemento.classList.contains('marcada')) {
                localStorage.setItem(`mark_${id}_${numero}`, "true");
                if (navigator.vibrate) navigator.vibrate(40);
            } else {
                localStorage.removeItem(`mark_${id}_${numero}`);
            }
        }

        // 3. ESCUCHADOR DE FIREBASE (TIEMPO REAL)
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.numero) {
                notificarNuevoNumero(data.letra, data.numero);
                iluminarCoincidencia(data.numero);
            }
        });

        function notificarNuevoNumero(letra, num) {
            const alertBox = document.getElementById('bingo-alert-live');
            const miniBola = document.createElement('div');
            miniBola.style = `background:white; color:#1d3557; border:3px solid #ffb703; border-radius:50px; padding:10px 20px; font-weight:900; box-shadow:0 4px 15px rgba(0,0,0,0.4); display:flex; align-items:center; gap:10px; animation: slideInRight 0.5s ease-out;`;
            miniBola.innerHTML = `<span style="color:#e63946; font-size:1.2rem">${letra}</span> <span style="font-size:1.5rem">${num}</span>`;
            alertBox.prepend(miniBola);
            if (navigator.vibrate) navigator.vibrate(100);
            setTimeout(() => {
                miniBola.style.opacity = "0";
                miniBola.style.transition = "1s";
                setTimeout(() => miniBola.remove(), 1000);
            }, 8000);
        }

        function iluminarCoincidencia(numSorteado) {
            const celdas = document.querySelectorAll('td');
            celdas.forEach(td => {
                if (td.innerText == numSorteado && !td.classList.contains('marcada')) {
                    td.style.boxShadow = "inset 0 0 20px rgba(255, 183, 3, 0.8)";
                    td.style.backgroundColor = "#fff9db";
                }
            });
        }
    </script>
</body>
</html>
