<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Pro - Jugador</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* --- 1. BARRA SUPERIOR Y ESTADOS --- */
        .historial-fijo {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #111827; display: flex; flex-wrap: wrap;
            gap: 4px; padding: 6px; z-index: 1000;
            border-bottom: 2px solid #ffb703;
            max-height: 18vh; overflow-y: auto;
            box-sizing: border-box; justify-content: center;
        }

        /* Pantalla de Espera / Cronómetro */
        #overlayEspera {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 20000; display: none; /* Se activa por JS */
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px;
        }

        #cronometro {
            font-size: 5rem; font-weight: 900; color: #ffb703;
            text-shadow: 0 0 20px rgba(255, 183, 3, 0.5);
            margin: 20px 0;
        }

        /* Banner de Anuncios (Verificando, Ganador) */
        #bannerAnuncio {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #e63946; color: white; padding: 15px 25px;
            border-radius: 50px; font-weight: bold; z-index: 15000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none; border: 2px solid white;
            animation: slideUp 0.5s ease-out;
            text-align: center; min-width: 280px;
        }

        @keyframes slideUp { from { bottom: -100px; } to { bottom: 20px; } }

        /* --- 2. BOTONES DE ACCIÓN --- */
        .controles-jugador {
            display: flex; gap: 10px; width: 100%; max-width: 500px; margin: 15px auto;
        }

        .btn-bingo {
            flex: 2; background: #22c55e; color: white; border: none;
            padding: 15px; border-radius: 8px; font-weight: 900;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 0 #16a34a;
        }

        .btn-bingo:active { transform: translateY(3px); box-shadow: none; }

        .btn-limpiar {
            flex: 1; background: #64748b; color: white; border: none;
            padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* --- 3. DISEÑO DE CARTONES (Mejorado) --- */
        .juego-container {
            margin-top: 20vh; flex: 1; display: flex; flex-direction: column;
            align-items: center; padding: 10px; padding-bottom: 100px;
        }

        .cartones-grid { width: 100%; display: flex; flex-direction: column; gap: 20px; align-items: center; }

        .bingo-card { 
            background: white; width: 100%; max-width: 450px; 
            border-radius: 12px; overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
        }

        .bingo-table td { 
            height: 55px; font-size: 1.8rem !important; 
            transition: all 0.2s; border: 1px solid #dee2e6;
        }

        .bingo-table td.marked { 
            background-color: #ffb703 !important; 
            color: #0f172a !important;
            position: relative;
        }

        .bingo-table td.marked::after {
            content: "✖"; position: absolute; font-size: 1rem; top: 2px; right: 2px; opacity: 0.5;
        }

        .guia-letras span { color: #ffb703; font-weight: 900; }
    </style>
</head>
<body>

    <div id="overlayEspera">
        <h2 id="tituloEstado">ESPERANDO AL ADMINISTRADOR</h2>
        <div id="cronometro">00:00</div>
        <p id="subtituloEstado">El juego comenzará pronto. ¡Prepara tus cartones!</p>
    </div>

    <div id="bannerAnuncio"></div>

    <div id="barraHistorial" class="historial-fijo">
        <div id="msgEspera" style="color: #94a3b8; font-size: 0.8rem; font-weight: bold; width: 100%; text-align: center;">
            SIN BOLAS CANTADAS
        </div>
    </div>

    <div class="juego-container">
        <div class="contenedor-patron-guia">
            <div class="guia-patron-titulo">Patrón de Victoria</div>
            <div class="guia-letras"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
            <div id="gridPatron" class="grid-patron"></div>
        </div>

        <div class="controles-jugador">
            <button class="btn-bingo" onclick="cantarBingo()">¡CANTAR BINGO!</button>
            <button class="btn-limpiar" onclick="confirmarLimpiarMarcas()">Limpiar</button>
        </div>

        <div id="contenedorCartones" class="cartones-grid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // FUNCIONES DE INTERFAZ INMEDIATA (Para asegurar que los botones funcionen)
        function cantarBingo() {
            // El ID se obtiene del localStorage o de los cartones cargados en juego.js
            const ids = JSON.parse(localStorage.getItem('mis_cartones_ids')) || ["?"];
            if (confirm("¿Estás seguro de que tienes BINGO?")) {
                db.ref('notificaciones/bingo').set({
                    id: ids[0], // Avisa con el primer ID que tenga
                    timestamp: Date.now()
                });
                alert("¡Grito de BINGO enviado! Espera la verificación.");
            }
        }

        function confirmarLimpiarMarcas() {
            if (confirm("¿Deseas quitar TODAS las marcas de tus cartones?")) {
                // Esta función debe estar definida en tu juego.js
                if (typeof limpiarTableroManual === "function") {
                    limpiarTableroManual();
                } else {
                    // Fallback directo
                    localStorage.removeItem('marcas_bingo');
                    location.reload();
                }
            }
        }
    </script>

    <script src="juego.js"></script>

</body>
</html>
