<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Cartones Gigantes</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* --- 1. BARRA SUPERIOR (MÁXIMO 20% DE LA PANTALLA) --- */
        .historial-fijo {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #111827; 
            display: flex; 
            flex-wrap: wrap; /* Para que bajen a la siguiente fila sin scroll */
            gap: 3px; padding: 5px; z-index: 10000;
            border-bottom: 2px solid #ffb703;
            max-height: 20vh; /* Límite estricto del 20% */
            overflow: hidden; /* Sin scroll */
            box-sizing: border-box;
            justify-content: center;
        }

        /* Bolas miniatura para que quepan todas en el 20% de altura */
        .bola-historial {
            background: #e63946; color: white; 
            width: 26px; height: 26px; 
            border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.4); flex-shrink: 0; 
            font-size: 0.6rem; line-height: 1;
        }
        .bola-historial small { font-size: 0.35rem; margin-bottom: -1px; }

        /* --- 2. CUERPO Y CONTENEDOR (CARTONES GIGANTES) --- */
        body { 
            margin: 0; background-color: #0f172a !important; 
            color: white; font-family: sans-serif; 
            padding-top: 22vh; /* Espacio para la barra superior */
        }

        .cartones-grid { 
            display: flex; 
            flex-direction: column; /* Uno debajo del otro para máximo tamaño */
            align-items: center; 
            gap: 40px; padding: 10px; width: 100%; box-sizing: border-box;
        }

        /* CONFIGURACIÓN DEL CARTÓN GIGANTE */
        .bingo-card { 
            width: 98% !important; /* Casi todo el ancho de la pantalla */
            max-width: 700px !important; /* Límite para que no se deforme en PC */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
        }

        /* Agrandamos la tabla interna */
        .bingo-table { width: 100%; border-collapse: separate; border-spacing: 4px; }
        .bingo-table th { font-size: 2rem; padding: 10px; }
        .bingo-table td { 
            font-size: 2.5rem !important; /* Números mucho más grandes */
            height: 80px; 
            font-weight: 900;
            border-radius: 8px;
        }

        /* --- 3. ELEMENTOS DE APOYO --- */
        .contenedor-patron {
            background: rgba(255, 255, 255, 0.05); border-radius: 8px; 
            padding: 8px; margin: 5px auto; width: fit-content;
            text-align: center; border: 1px solid #334155;
        }
        .grid-patron {
            display: grid; grid-template-columns: repeat(5, 14px);
            gap: 3px; justify-content: center;
        }
        .celda-patron { width: 14px; height: 14px; border-radius: 2px; background: #1e293b; }
        .celda-patron.activa { background: #ffb703; box-shadow: 0 0 5px #ffb703; }

        .logo-bingo { color: #ffb703; text-align: center; font-size: 1.8rem; margin: 10px 0 5px 0; }
        .aviso-reto { text-align: center; color: #ef4444; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; }
        .setup-panel { display: none; }
    </style>
</head>
<body>

    <div id="barraHistorial" class="historial-fijo">
        <div id="msgEspera" style="color: #64748b; font-size: 0.7rem;">Esperando números...</div>
    </div>

    <div class="juego-container">
        <div class="contenedor-patron">
            <div id="gridPatron" class="grid-patron"></div>
        </div>

        <h1 class="logo-bingo">BINGO DIGITAL</h1>
        <p class="aviso-reto">⚠️ MARCA TUS NÚMEROS MANUALMENTE</p>

        <div id="contenedorCartones" class="cartones-grid"></div>
    </div>

    <div class="setup-panel">
        <input type="text" id="id1"> <input type="text" id="id2">
        <input type="text" id="id3"> <input type="text" id="id4">
        <button id="btnGenerar"></button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let historialLocal = [];

        // Escuchar partida y reinicio
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data?.status === "reiniciado") {
                localStorage.clear();
                location.reload();
                return;
            }
            if (data?.numero) {
                actualizarBarra(data.letra, data.numero);
            }
        });

        function actualizarBarra(l, n) {
            if (historialLocal.includes(n)) return;
            historialLocal.push(n);
            const barra = document.getElementById('barraHistorial');
            if (historialLocal.length === 1) barra.innerHTML = '';
            
            const bola = document.createElement('div');
            bola.className = 'bola-historial';
            bola.innerHTML = `<small>${l}</small><span>${n}</span>`;
            barra.appendChild(bola);
        }

        // Cargar cartones desde el link
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            if (p) {
                try {
                    const decoded = JSON.parse(atob(p));
                    const ids = Array.isArray(decoded) ? decoded : [decoded];
                    ids.forEach((item, i) => {
                        if (i < 4) document.getElementById(`id${i+1}`).value = item.id || item;
                    });
                } catch(e) {
                    document.getElementById('id1').value = p;
                }
                document.getElementById('btnGenerar').click();
            }
        };
    </script>
    <script src="juego.js"></script>
</body>
</html>
