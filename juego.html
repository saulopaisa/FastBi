<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo - Juego en Vivo</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* Estilo para la notificación flotante de número cantado */
        .notificacion-numero {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e63946;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #ffb703;
        }

        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="juego-container">
        <header class="juego-header">
            <h1 class="logo-bingo">BINGO DIGITAL</h1>
            <p>Toca los números para marcarlos</p>
        </header>

        <div id="contenedorCartones" class="cartones-grid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Configuración de Firebase (Debe ser igual a la de ruleta.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        console.log("Conectando a Firebase...");

        // ESCUCHA EN TIEMPO REAL
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("Datos de Firebase:", data);

            if (data && data.numero) {
                mostrarAvisoNumero(data.letra, data.numero);
                resaltarEnCarton(data.numero);
            }
        });

        // Función para mostrar un mensaje visual al jugador
        function mostrarAvisoNumero(letra, numero) {
            // Eliminar aviso anterior si existe
            const viejo = document.querySelector('.notificacion-numero');
            if (viejo) viejo.remove();

            const aviso = document.createElement('div');
            aviso.className = 'notificacion-numero';
            aviso.innerHTML = `¡SALIÓ LA ${letra} - ${numero}!`;
            document.body.appendChild(aviso);

            // Sonido opcional o vibración
            if (navigator.vibrate) navigator.vibrate(200);

            // Desaparecer después de 5 segundos
            setTimeout(() => { if(aviso) aviso.remove(); }, 5000);
        }

        // Función para iluminar el número si el jugador lo tiene
        function resaltarEnCarton(numero) {
            const celdas = document.querySelectorAll('.cell');
            celdas.forEach(celda => {
                if (parseInt(celda.innerText) === numero) {
                    celda.style.boxShadow = "0 0 20px #ffb703";
                    celda.style.border = "3px solid #ffb703";
                    // No lo marcamos automáticamente para que el jugador participe, 
                    // solo le damos una pista visual.
                }
            });
        }
    </script>

    <script src="juego.js"></script>

</body>
</html>
