<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Juego en Vivo</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* --- 1. BARRA SUPERIOR ULTRA COMPACTA --- */
        .historial-fijo {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #1d3557; display: flex; align-items: center;
            gap: 5px; padding: 5px 8px; z-index: 10000;
            border-bottom: 2px solid #ffb703; overflow-x: auto;
            height: 45px; scrollbar-width: none;
        }
        .historial-fijo::-webkit-scrollbar { display: none; }

        .bola-historial {
            background: #e63946; color: white; min-width: 34px; height: 34px;
            border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 900;
            border: 1px solid white; flex-shrink: 0; font-size: 0.75rem;
        }

        /* --- 2. GUÍA DE FORMA DE GANAR --- */
        .contenedor-patron {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px; padding: 8px;
            margin: 5px auto; width: fit-content;
            text-align: center; border: 1px solid #334155;
        }
        .grid-patron {
            display: grid; grid-template-columns: repeat(5, 10px);
            gap: 2px; justify-content: center; margin-top: 4px;
        }
        .celda-patron { width: 10px; height: 10px; border-radius: 1px; background: #1e293b; }
        .celda-patron.activa { background: #ffb703; box-shadow: 0 0 4px #ffb703; }

        /* --- 3. AJUSTES DE PANTALLA --- */
        body { 
            margin: 0; background-color: #0f172a !important; 
            color: white; font-family: sans-serif; padding-top: 55px; 
        }

        /* Eliminamos las restricciones de ancho para que el cartón sea como antes */
        .cartones-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 20px; padding: 10px; width: 100%; 
        }

        /* Mantenemos el panel de carga presente pero invisible para que juego.js no falle */
        .setup-panel { position: absolute; visibility: hidden; pointer-events: none; }

        .logo-bingo { color: #ffb703; text-align: center; font-size: 1.1rem; margin: 10px 0 0 0; }
        .aviso-reto { text-align: center; color: #ef4444; font-size: 0.65rem; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="barraHistorial" class="historial-fijo">
        <div id="msgEspera" style="color: #64748b; font-size: 0.6rem; width:100%; text-align:center;">Esperando inicio...</div>
    </div>

    <div class="setup-panel">
        <input type="number" id="id1"> <input type="number" id="id2">
        <input type="number" id="id3"> <input type="number" id="id4">
        <button id="btnGenerar">CARGAR</button>
    </div>

    <div class="contenedor-patron">
        <div style="color: #94a3b8; font-size: 0.6rem; font-weight: bold; text-transform: uppercase;">Para Ganar:</div>
        <div id="gridPatron" class="grid-patron"></div>
    </div>

    <div class="juego-container">
        <h1 class="logo-bingo">BINGO DIGITAL</h1>
        <p class="aviso-reto">SIN AYUDA VISUAL - ¡ATENTO A TUS NÚMEROS!</p>

        <div id="contenedorCartones" class="cartones-grid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let historialLocal = [];

        // ESCUCHAR FIREBASE (NÚMEROS Y REINICIO)
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            
            // Lógica de Reinicio de Partida
            if (data && data.status === "reiniciado") {
                location.reload(); // Recarga la página para limpiar todo
                return;
            }

            if (data && data.numero) {
                actualizarHistorialSuperior(data.letra, data.numero);
                // NOTA: resaltEnCarton se ha eliminado por completo.
            }
        });

        // ESCUCHAR FORMA DE GANAR (PATRÓN)
        db.ref('configuracion/patron').on('value', (snapshot) => {
            const patron = snapshot.val();
            const grid = document.getElementById('gridPatron');
            grid.innerHTML = '';
            const p = patron || Array(25).fill(false);
            p.forEach((activo) => {
                const celda = document.createElement('div');
                celda.className = `celda-patron ${activo ? 'activa' : ''}`;
                grid.appendChild(celda);
            });
        });

        function actualizarHistorialSuperior(letra, numero) {
            if (historialLocal.includes(numero)) return;
            historialLocal.unshift(numero);
            const barra = document.getElementById('barraHistorial');
            if (historialLocal.length === 1) barra.innerHTML = '';
            
            const bola = document.createElement('div');
            bola.className = 'bola-historial';
            bola.innerHTML = `<small>${letra}</small><span>${numero}</span>`;
            barra.prepend(bola);
            barra.scrollLeft = 0;
        }

        // AUTO-DETECCIÓN DEL LINK (Para cargar el cartón automáticamente)
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const p = urlParams.get('p');
            if (p) {
                // Si el link trae el ID, lo cargamos silenciosamente
                document.getElementById('id1').value = p; 
                document.getElementById('btnGenerar').click();
            }
        });
    </script>

    <script src="juego.js"></script>
</body>
</html>
