<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Adaptable</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* --- 1. BARRA SUPERIOR --- */
        .historial-fijo {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #111827; display: flex; flex-wrap: wrap;
            gap: 4px; padding: 6px; z-index: 10000;
            border-bottom: 2px solid #ffb703;
            max-height: 20vh; overflow: hidden;
            box-sizing: border-box; justify-content: center;
        }

        .bola-historial {
            background: #e63946; color: white; width: 28px; height: 28px;
            border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.4); font-size: 0.65rem;
        }

        /* --- 2. CONTENEDOR PRINCIPAL --- */
        body { 
            margin: 0; background-color: #0f172a !important; 
            color: white; font-family: sans-serif; 
            overflow-x: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }

        .juego-container {
            margin-top: 22vh; flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 5px; box-sizing: border-box;
        }

        /* --- 3. DISEÑO DEL CARTÓN GUÍA --- */
        .contenedor-patron-guia {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 10px;
            margin: 0 auto 15px;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .guia-patron-titulo {
            color: #94a3b8; font-size: 0.6rem; font-weight: bold;
            text-transform: uppercase; margin-bottom: 8px; text-align: center;
        }

        .guia-letras {
            display: grid; grid-template-columns: repeat(5, 20px);
            gap: 4px; margin-bottom: 5px;
        }

        .guia-letras span {
            font-size: 0.75rem; font-weight: 900; color: #ffb703; text-align: center;
        }

        .grid-patron {
            display: grid; grid-template-columns: repeat(5, 20px);
            gap: 4px; justify-content: center;
        }

        .celda-patron {
            width: 20px; height: 20px; border-radius: 3px;
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            transition: background 0.3s ease;
        }

        .celda-patron.activa {
            background: #ffb703 !important;
            box-shadow: 0 0 8px #ffb703;
            border-color: #ffb703;
        }

        /* --- 4. CARTONES Y RESPONSIVIDAD --- */
        .cartones-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; }
        
        @media (min-width: 768px) {
            .bingo-card { width: 45% !important; max-width: 550px; }
            .bingo-table td { font-size: 2.5rem !important; }
        }

        @media (max-width: 767px) {
            .bingo-card { width: 95% !important; margin-bottom: 20px; }
            .bingo-table td { font-size: 2rem !important; height: 60px; }
            body { overflow-y: auto; }
        }

        .bingo-card { background: white; color: #1e293b; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-id-label { background: #1e3a8a; color: white; padding: 5px; font-weight: bold; text-align: center; }
        .bingo-table { width: 100%; border-collapse: collapse; }
        .bingo-table th { background: #1e293b; color: white; padding: 5px; }
        .bingo-table td { border: 1px solid #cbd5e1; text-align: center; cursor: pointer; font-weight: 900; }
        .bingo-table td.marked { background-color: #ffb703 !important; }
        .free-space { background: #f8fafc; font-size: 0.8rem !important; color: #64748b; }
        .setup-panel { display: none; }
    </style>
</head>
<body>

    <div id="barraHistorial" class="historial-fijo">
        <div id="msgEspera" style="color: #64748b; font-size: 0.7rem;">Esperando números...</div>
    </div>

    <div class="juego-container">
        <div class="contenedor-patron-guia">
            <div class="guia-patron-titulo">Patrón de Victoria</div>
            <div class="guia-letras">
                <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
            </div>
            <div id="gridPatron" class="grid-patron">
                </div>
        </div>

        <h1 style="font-size: 1.2rem; margin: 5px; color: #ffb703; text-shadow: 0 0 10px rgba(255,183,3,0.3);">BINGO DIGITAL</h1>
        <p style="text-align: center; color: #ef4444; font-size: 0.7rem; font-weight: bold; margin: 2px;">⚠️ MARCA MANUAL</p>

        <div id="contenedorCartones" class="cartones-grid"></div>
    </div>

    <div class="setup-panel">
        <input type="text" id="id1"> <input type="text" id="id2">
        <input type="text" id="id3"> <input type="text" id="id4">
        <button id="btnGenerar"></button>
    </div>

    <script src="juego.js"></script>

</body>
</html>
