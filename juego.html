<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo - Juego en Vivo</title>
    <link rel="stylesheet" href="juego.css">
    <style>
        /* Estilos para la barra de números arriba */
        .historial-fijo {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #1d3557; display: flex; align-items: center;
            gap: 8px; padding: 10px; z-index: 9999;
            border-bottom: 3px solid #ffb703; overflow-x: auto;
            min-height: 60px;
        }
        .bola-historial {
            background: #e63946; color: white; min-width: 45px; height: 45px;
            border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 900;
            border: 2px solid white; flex-shrink: 0;
        }

        /* Panel de entrada de IDs (Lo que tu juego.js necesita) */
        .setup-panel {
            background: #f1faee; padding: 15px; border-radius: 10px;
            margin: 80px 10px 20px 10px; border: 2px dashed #1d3557;
            text-align: center;
        }
        .setup-panel input {
            width: 60px; padding: 8px; margin: 5px;
            border-radius: 5px; border: 1px solid #ccc; text-align: center;
        }
        #btnGenerar {
            background: #1d3557; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            font-weight: bold; margin-top: 10px;
        }

        body { margin: 0; background-color: #1d3557; color: white; font-family: sans-serif; }
        .cartones-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        
        /* Estilos para que las celdas marcadas se vean bien */
        .marked { background-color: #ffb703 !important; color: #1d3557 !important; font-weight: bold; }
    </style>
</head>
<body>

    <div id="barraHistorial" class="historial-fijo">
        <div style="color: #a8dadc; font-size: 0.8rem; width:100%; text-align:center;">Esperando números...</div>
    </div>

    <div class="setup-panel">
        <h3 style="color: #1d3557; margin-top:0;">Configura tus Cartones</h3>
        <input type="number" id="id1" placeholder="ID 1">
        <input type="number" id="id2" placeholder="ID 2">
        <input type="number" id="id3" placeholder="ID 3">
        <input type="number" id="id4" placeholder="ID 4">
        <br>
        <button id="btnGenerar">CARGAR CARTONES</button>
    </div>

    <div class="juego-container">
        <div id="contenedorCartones" class="cartones-grid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAOHYo0w41dV6TRarAaGt58Zxn4o47dNUE",
            authDomain: "bingofast.firebaseapp.com",
            databaseURL: "https://bingofast-default-rtdb.firebaseio.com",
            projectId: "bingofast",
            storageBucket: "bingofast.firebasestorage.app",
            messagingSenderId: "473863283329",
            appId: "1:473863283329:web:2c4bf96de167d105fa6380",
            measurementId: "G-Z7VH6JYV4D"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let historialLocal = [];

        // ESCUCHA DE FIREBASE
        db.ref('partidaActual').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.numero) {
                actualizarHistorialSuperior(data.letra, data.numero);
                resaltarEnCarton(data.numero);
            }
        });

        function actualizarHistorialSuperior(letra, numero) {
            if (historialLocal[0] === numero) return;
            historialLocal.unshift(numero);
            const barra = document.getElementById('barraHistorial');
            if (historialLocal.length === 1) barra.innerHTML = '';
            const bola = document.createElement('div');
            bola.className = 'bola-historial';
            bola.innerHTML = `<small>${letra}</small><span>${numero}</span>`;
            barra.prepend(bola);
        }

        function resaltarEnCarton(numero) {
            // Busca todas las celdas de los cartones generados
            const celdas = document.querySelectorAll('td');
            celdas.forEach(celda => {
                if (parseInt(celda.innerText) === numero) {
                    celda.style.boxShadow = "inset 0 0 10px #e63946";
                    celda.style.border = "2px solid #e63946";
                }
            });
        }
    </script>

    <script src="juego.js"></script>

</body>
</html>
